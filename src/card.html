<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Window</title>

  <!-- Performance optimizations -->
  <meta http-equiv="x-dns-prefetch-control" content="on">
  <link rel="dns-prefetch" href="//www.google.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="preconnect" href="https://www.google.com">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Spring open/close card motion - simplified for GPU */
    @keyframes springPopIn {
      0% {
        transform: scale(0.28) translateY(34px) translateZ(0);
        opacity: 0;
      }

      58% {
        transform: scale(1.08) translateY(-6px) translateZ(0);
        opacity: 1;
      }

      78% {
        transform: scale(0.96) translateY(2px) translateZ(0);
      }

      100% {
        transform: scale(1) translateY(0) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes springPopOut {
      0% {
        transform: scale(1) translateY(0) translateZ(0);
        opacity: 1;
      }

      34% {
        transform: scale(1.06) translateY(-4px) translateZ(0);
        opacity: 1;
      }

      100% {
        transform: scale(0.24) translateY(28px) translateZ(0);
        opacity: 0;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .card-window {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      border-radius: 24px;
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 50px 100px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      /* Simplified animation duration for GPU */
      animation: springPopIn 400ms cubic-bezier(0.19, 1.2, 0.32, 1) both;
      position: relative;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    /* Shimmer effect on card appearance */
    .card-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent);
      animation: shimmer 1.5s ease-in-out;
      pointer-events: none;
      z-index: 1000;
    }

    .card-window.is-minimizing {
      /* Simplified animation for GPU */
      animation: springPopOut 200ms ease-out forwards;
      pointer-events: none;
    }

    .card-window.is-restoring {
      /* Simplified animation for GPU */
      animation: springPopIn 350ms cubic-bezier(0.19, 1.2, 0.32, 1) both;
      pointer-events: auto;
    }

    .card-titlebar {
      height: 48px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .theme-sunset .card-titlebar,
    .theme-alt .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 80, 150, 0.45), rgba(255, 70, 70, 0.45));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-ocean .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 198, 255, 0.42), rgba(0, 114, 255, 0.44));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-emerald .card-titlebar {
      background: linear-gradient(135deg, rgba(14, 142, 70, 0.62), rgba(58, 191, 92, 0.55));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-amber .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 140, 30, 0.65), rgba(255, 92, 24, 0.58));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-midnight .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.92), rgba(18, 18, 18, 0.88));
      border-bottom: 2px solid rgba(255, 255, 255, 0.18);
    }

    .theme-cocoa .card-titlebar {
      background: linear-gradient(135deg, rgba(76, 42, 24, 0.92), rgba(132, 78, 46, 0.88));
      border-bottom: 2px solid rgba(255, 220, 190, 0.22);
    }

    .card-titlebar:active {
      cursor: default;
    }

    .title-text {
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      animation: fadeInSlide 0.5s ease 0.2s backwards;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-10px) translateZ(0);
      }

      to {
        opacity: 1;
        transform: translateX(0) translateZ(0);
      }
    }

    .card-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      /* Simplified animation for GPU */
      animation: fadeInSlide 0.3s ease 0.2s backwards;
    }

    .card-button {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .card-button.size-btn {
      background: rgba(100, 200, 255, 0.7);
    }

    .card-button.minimize-btn {
      background: rgba(255, 200, 50, 0.7);
    }

    /* Bookmark button - white/transparent */
    .card-button.bookmark-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card-button.bookmark-btn.bookmarked {
      background: rgba(255, 215, 0, 0.8);
      border-color: rgba(255, 215, 0, 0.9);
    }

    /* Readmode button - dark blue */
    .card-button.readmode-btn {
      background: rgba(30, 90, 160, 0.8);
    }

    .card-button.readmode-btn:hover {
      background: rgba(50, 130, 200, 0.95);
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(50, 130, 200, 0.6);
    }

    /* Cycle button - teal/green */
    .card-button.cycle-btn {
      background: rgba(40, 160, 120, 0.8);
    }

    .card-button.cycle-btn:hover {
      background: rgba(50, 200, 150, 0.95);
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(50, 200, 150, 0.6);
    }

    .card-button:hover {
      background: rgba(255, 67, 67, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 67, 67, 0.4);
    }

    .card-button.size-btn:hover {
      background: rgba(67, 180, 255, 0.9);
      box-shadow: 0 4px 12px rgba(67, 180, 255, 0.4);
    }

    .card-button.minimize-btn:hover {
      background: rgba(255, 180, 30, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 180, 30, 0.4);
    }

    .card-button.bookmark-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }

    .card-button.bookmark-btn.bookmarked:hover {
      background: rgba(255, 215, 0, 0.95);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.6);
    }

    .card-button:active {
      background: rgba(255, 50, 50, 1);
      transform: scale(0.95);
    }

    /* Download ring styling inside card */
    .download-ring__bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.25);
      stroke-width: 3.2;
    }

    .download-ring__fg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-dasharray: 97.4;
      stroke-dashoffset: 97.4;
      transition: stroke-dashoffset 0.15s ease;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    .download-ring.indeterminate .download-ring__fg {
      stroke-dasharray: 24, 97.4;
      stroke-dashoffset: 0;
      animation: downloadRingSpin 1s linear infinite;
    }

    .download-ring.completed .download-ring__fg {
      stroke: rgba(100, 255, 100, 0.95);
    }

    .download-ring.completed .download-ring__icon {
      color: rgba(100, 255, 100, 1);
    }

    @keyframes downloadRingSpin {
      to {
        transform: rotate(270deg) translateZ(0);
      }
    }

    .card-navbar {
      height: 60px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 10;
      /* GPU acceleration */
      transform: translateZ(0);
    }

    .nav-button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.12) translateY(-2px) translateZ(0);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-button:active {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.95) translateZ(0);
    }

    .nav-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .url-input {
      flex: 1;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 0 12px;
      color: white;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      /* Simplified transition for GPU */
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      transform: translateZ(0);
    }

    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      transform: scale(1.02) translateZ(0);
    }

    .card-content {
      flex: 1;
      overflow: hidden;
      background: white;
      position: relative;
      animation: contentFadeIn 0.6s ease 0.3s backwards;
    }

    .security-load-notice {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 12px;
      z-index: 40;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 180, 120, 0.55);
      background: linear-gradient(135deg, rgba(64, 24, 0, 0.92), rgba(38, 16, 0, 0.9));
      color: rgba(255, 236, 214, 0.96);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
      font-size: 11px;
      line-height: 1.45;
      backdrop-filter: blur(4px);
      display: none;
      -webkit-app-region: no-drag;
    }

    .security-load-notice.active {
      display: block;
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: scale(0.98) translateZ(0);
      }

      to {
        opacity: 1;
        transform: scale(1) translateZ(0);
      }
    }

    .loading-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #f093fb, #667eea);
      background-size: 200% 100%;
      /* Simplified animation for GPU */
      animation: gradientShift 1.5s ease-in-out infinite;
      z-index: 100;
      display: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
      will-change: background-position;
    }

    .loading-indicator.active {
      display: block;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-top: 3px solid #667eea;
      border-radius: 50%;
      /* Simplified animation for GPU */
      animation: spin 0.8s linear infinite;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      will-change: transform;
    }

    .loading-spinner.active {
      display: block;
    }

    @keyframes spin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) translateZ(0);
      }

      100% {
        transform: translate(-50%, -50%) rotate(360deg) translateZ(0);
      }
    }

    /* Pulse effect for active elements - simplified */
    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(102, 126, 234, 0);
      }
    }

    webview {
      /* Simplified animation for GPU */
      animation: webviewFadeIn 0.4s ease-out 0.2s backwards;
    }

    @keyframes webviewFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideOut {
      to {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
    }

    .loading-wave {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 50%, rgba(120, 255, 214, 0.9) 0%, rgba(120, 255, 214, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 40% 50%, rgba(120, 180, 255, 0.9) 0%, rgba(120, 180, 255, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 70% 50%, rgba(255, 120, 240, 0.9) 0%, rgba(255, 120, 240, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(102, 126, 234, 0.0), rgba(240, 147, 251, 0.75), rgba(102, 126, 234, 0.0)) 0 0 / 220px 100%;
      animation: waveDrift 1.2s linear infinite;
      filter: drop-shadow(0 2px 6px rgba(102, 126, 234, 0.6));
    }

    .theme-sunset .loading-wave,
    .theme-alt .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(255, 120, 200, 0.85) 0%, rgba(255, 120, 200, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(255, 110, 110, 0.85) 0%, rgba(255, 110, 110, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(255, 170, 210, 0.85) 0%, rgba(255, 170, 210, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(255, 80, 150, 0.0), rgba(255, 70, 70, 0.75), rgba(255, 80, 150, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(255, 80, 150, 0.55));
    }

    .theme-ocean .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(100, 230, 255, 0.86) 0%, rgba(100, 230, 255, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(80, 160, 255, 0.86) 0%, rgba(80, 160, 255, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(120, 210, 255, 0.86) 0%, rgba(120, 210, 255, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(0, 198, 255, 0.0), rgba(0, 114, 255, 0.78), rgba(0, 198, 255, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(0, 156, 255, 0.52));
    }

    .theme-emerald .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(85, 250, 180, 0.84) 0%, rgba(85, 250, 180, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(40, 210, 170, 0.84) 0%, rgba(40, 210, 170, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(110, 255, 205, 0.84) 0%, rgba(110, 255, 205, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(17, 153, 142, 0.0), rgba(56, 239, 125, 0.78), rgba(17, 153, 142, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(56, 239, 125, 0.5));
    }

    .theme-amber .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(255, 180, 110, 0.86) 0%, rgba(255, 180, 110, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(255, 125, 110, 0.86) 0%, rgba(255, 125, 110, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(255, 210, 150, 0.86) 0%, rgba(255, 210, 150, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(255, 153, 102, 0.0), rgba(255, 94, 98, 0.78), rgba(255, 153, 102, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(255, 130, 90, 0.5));
    }

    .theme-midnight .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(160, 160, 170, 0.72) 0%, rgba(160, 160, 170, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(90, 90, 100, 0.78) 0%, rgba(90, 90, 100, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(130, 130, 140, 0.74) 0%, rgba(130, 130, 140, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(18, 18, 22, 0.0), rgba(58, 58, 66, 0.86), rgba(18, 18, 22, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.58));
    }

    .theme-cocoa .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(196, 146, 106, 0.82) 0%, rgba(196, 146, 106, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(166, 109, 67, 0.84) 0%, rgba(166, 109, 67, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(230, 182, 136, 0.78) 0%, rgba(230, 182, 136, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(110, 72, 44, 0.0), rgba(166, 123, 91, 0.8), rgba(110, 72, 44, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(135, 86, 48, 0.52));
    }

    .loading-wave.active {
      opacity: 1;
      transform: translateY(0) translateZ(0);
    }

    @keyframes waveDrift {
      0% {
        background-position: 0 0, 0 0, 0 0, 0 0;
      }

      100% {
        background-position: 240px 0, -280px 0, 320px 0, -220px 0;
      }
    }

    .media-hover-control {
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 20;
      -webkit-app-region: no-drag;
      opacity: 0;
      pointer-events: none;
      /* Simplified transition for GPU */
      transition: opacity 0.2s ease, transform 0.2s ease;
      /* GPU acceleration */
      transform: translateX(-50%) translateZ(0);
      will-change: transform, opacity;
    }

    .media-hover-control.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .audio-visualizer {
      height: 24px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      padding: 4px 14px;
      min-width: 68px;
      border-radius: 0 0 7px 7px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-top: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      width: auto;
      align-self: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-app-region: no-drag;
      /* GPU acceleration */
      transform: translateZ(0);
      will-change: transform;
    }

    .audio-visualizer:hover,
    .media-hover-control.panel-open .audio-visualizer {
      background: rgba(10, 20, 30, 0.88);
      border-color: rgba(124, 247, 255, 0.5);
      box-shadow: 0 10px 22px rgba(10, 20, 30, 0.55);
    }

    .audio-visualizer span {
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(180deg, #7cf7ff 0%, #7b8bff 50%, #ff6ff0 100%);
      /* Simplified animation for GPU - reduced complexity */
      animation: audioPulse 1.2s ease-in-out infinite;
      transform-origin: bottom;
      /* GPU acceleration - force hardware acceleration */
      transform: translateZ(0);
      will-change: transform, opacity;
      animation-play-state: paused;
    }

    .audio-visualizer.playing span {
      animation-play-state: running;
    }

    .audio-visualizer.viz-style-pulse span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      animation-name: audioPulseDot;
      animation-duration: 1.05s;
      box-shadow: 0 0 8px rgba(124, 247, 255, 0.35);
    }

    .audio-visualizer.viz-style-ladder span:nth-child(1) {

      height: 18px;

    .audio-visualizer.viz-style-ladder span {

    .audio-visualizer.video-mode span {

    .audio-visualizer span:nth-child(2) {
      animation-delay: -0.3s;

    .audio-visualizer span:nth-child(3) {

    .media-hover-panel {
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;

        linear-gradient(135deg, rgba(8, 14, 28, 0.93), rgba(16, 26, 42, 0.93));

      /* GPU acceleration */
      transform: translateY(-5px) scale(0.98) translateZ(0);
      will-change: transform, opacity;
    }

    .media-hover-control.panel-open .media-hover-panel {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;

    .media-control-btn:hover {
      background: rgba(124, 247, 255, 0.2);
      border-color: rgba(124, 247, 255, 0.55);
    }

    .media-seek-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .media-seek-btn {
      font-size: 12px;
      padding: 5px 7px;

    .media-volume-group {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;

    .media-volume-row {

    .media-remaining-time {
      width: 100%;

      letter-spacing: 0.25px;

      font-family: 'Monaco', 'Menlo', monospace;
      line-height: 1;
      min-height: 12px;
      text-align: left;
    }

    @keyframes audioPulse {

      0%,
      100% {
        /* Use transform: scaleY which is GPU-accelerated */
        transform: scaleY(0.4) translateZ(0);
        opacity: 0.55;
      }

      50% {
        transform: scaleY(1) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes audioPulseLite {

      0%,
      100% {
        transform: scaleY(0.72) translateZ(0);
        opacity: 0.75;
      }

      50% {
        transform: scaleY(0.92) translateZ(0);
        opacity: 0.92;
      }
    }

    @keyframes audioPulseDot {

      0%,
      100% {
        transform: translateY(3px) scale(0.85) translateZ(0);
        opacity: 0.55;
      }

      50% {
        transform: translateY(-2px) scale(1.6) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes audioPulseTall {

      0%,
      100% {
        transform: scaleY(0.38) translateZ(0);
        opacity: 0.55;
      }

      35% {
        transform: scaleY(1.2) translateZ(0);
        opacity: 1;
      }

      70% {
        transform: scaleY(0.72) translateZ(0);
        opacity: 0.82;
      }
    }

    @keyframes audioOrbit {

      0%,
      100% {
        transform: translateY(0) scale(0.9) translateZ(0);
        opacity: 0.6;
      }

      33% {
        transform: translateY(-5px) scale(1.15) translateZ(0);
        opacity: 1;
      }

      66% {
        transform: translateY(4px) scale(0.8) translateZ(0);
        opacity: 0.7;
      }
    }

    /* Reduce animation overhead when visualizer is not visible */
    @media (prefers-reduced-motion: reduce) {
      .audio-visualizer span {
        animation: none;
      }
    }

    .split-container {
      width: 100%;
      height: 100%;

    .zoom-control {

    @keyframes cyclePopIn {
      0%   { transform: scale(0.94) translateZ(0); opacity: 0.6; }
      60%  { transform: scale(1.03) translateZ(0); opacity: 1; }
      100% { transform: scale(1)    translateZ(0); opacity: 1; }
    }

    .card-window.cycle-arriving {
      animation: cyclePopIn 280ms cubic-bezier(0.34, 1.45, 0.64, 1) forwards !important;
      will-change: transform, opacity;
    }
  </style>
</head>

<body>
  <div class="card-window">
    <!-- Titlebar with navigation and close button -->
    <div class="card-titlebar">
      <div style="display:flex; align-items:center; gap:8px; -webkit-app-region: no-drag;">

        <button class="card-button minimize-btn" id="minimize-btn" title="Minimize">−</button>
        <button class="card-button bookmark-btn" id="bookmark-btn" title="Bookmark">🔖</button>
        <button class="card-button readmode-btn" id="readmode-btn" title="Read Mode">📖</button>
        <button class="card-button cycle-btn" id="cycle-btn" title="Cycle Windows"><img src="../assets/cycle.png" alt="Cycle" style="width:16px; height:16px; pointer-events:none;" draggable="false"></button>
        <button class="card-button" id="split-btn" title="Split Screen">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false">
            <rect x="3" y="4" width="7" height="16" rx="1.5" ry="1.5" fill="none" stroke="currentColor"
              stroke-width="1.6" />
            <rect x="14" y="4" width="7" height="16" rx="1.5" ry="1.5" fill="none" stroke="currentColor"
              stroke-width="1.6" />
            <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="1.4" />
          </svg>
        </button>
        <!-- Per-card download progress ring (only visible while downloading in this window) -->
        <button class="card-button download-ring" id="card-download-ring" title="Downloading..." aria-hidden="true"
          style="display:none; position:relative;">
          <svg viewBox="0 0 36 36" class="download-ring__svg" aria-hidden="true"
            style="position:absolute; inset:4px; width:calc(100% - 8px); height:calc(100% - 8px);">
            <path class="download-ring__bg" d="M18 2.5 a 15.5 15.5 0 0 1 0 31 a 15.5 15.5 0 0 1 0 -31" />
            <path class="download-ring__fg" d="M18 2.5 a 15.5 15.5 0 0 1 0 31 a 15.5 15.5 0 0 1 0 -31" />
          </svg>
          <span class="download-ring__icon" style="position:relative; z-index:1; font-size:13px;">⬇</span>
        </button>
      </div>
      <span class="title-text">New Tab</span>
      <div class="media-hover-control" id="media-hover-control" aria-hidden="true">
        <button class="audio-visualizer" id="audio-visualizer" type="button" aria-label="Media controls">
          <span></span>
          <span></span>
          <span></span>

          <div class="media-seek-group">
            <button class="media-control-btn media-seek-btn" id="media-seek-back-btn" type="button" title="Rewind 10s">⏪</button>
            <button class="media-control-btn media-seek-btn" id="media-seek-forward-btn" type="button" title="Forward 10s">⏩</button>

            </span>

          <button class="media-control-btn" id="media-visualizer-style-btn" type="button" title="Change visualizer style">Viz</button>

      </div>
      <div class="card-controls">

    <!-- Content area: use webview for full site navigation -->
    <div class="card-content">
      <div class="split-container" id="split-container">
        <div class="split-pane split-pane-left">
          <webview id="card-webview" style="width:100%; height:100%;" partition="persist:webview" allowpopups preload=""
            disablewebsecurity="false" enableremotemodule="false" enableblinkfeatures="LazyLoad,LazyImageLoading"
            disableblinkfeatures="AutoplayIgnoresWebAudio"></webview>

            <button class="split-go-btn" id="split-go-btn">Go</button>
          </div>
          <webview id="split-webview" style="width:100%; flex:1 1 auto;" partition="persist:webview" allowpopups
            preload="" disablewebsecurity="false" enableremotemodule="false"
            enableblinkfeatures="LazyLoad,LazyImageLoading" disableblinkfeatures="AutoplayIgnoresWebAudio"></webview>

  <script>
    // Get card ID and initial URL from query parameters
    const params = new URLSearchParams(window.location.search);
    let cardId = params.get('cardId');
    cardId = parseInt(cardId, 10);
    const encodedUrl = params.get('url');
    const theme = (params.get('theme') || 'primary').toLowerCase();
    let initialUrl = null;
    if (encodedUrl) {
      try {
        initialUrl = atob(encodedUrl);
      } catch (e) {
        initialUrl = decodeURIComponent(encodedUrl);
      }
    }

    // Apply theme
    const cardWindowEl = document.querySelector('.card-window');
    if (cardWindowEl) {
      const allThemeClasses = ['theme-alt', 'theme-sunset', 'theme-ocean', 'theme-emerald', 'theme-amber', 'theme-midnight', 'theme-cocoa'];
      allThemeClasses.forEach((cls) => cardWindowEl.classList.remove(cls));
      const normalizedTheme = theme === 'alt' ? 'sunset' : theme;
      if (normalizedTheme !== 'primary') {
        cardWindowEl.classList.add(`theme-${normalizedTheme}`);
      }
    }

    // Get DOM elements
    const closeBtn = document.getElementById('close-btn');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const wideBtn = document.getElementById('wide-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const minimizeBtn = document.getElementById('minimize-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    const readmodeBtn = document.getElementById('readmode-btn');
    const splitBtn = document.getElementById('split-btn');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    const zoomInBtn = document.getElementById('zoom-in-btn');
    const zoomPercent = document.getElementById('zoom-percent');
    const urlInput = document.getElementById('url-input');
    const titleElement = document.querySelector('.title-text');
    const webview = document.getElementById('card-webview');
    const splitContainer = document.getElementById('split-container');
    const splitRightPane = document.getElementById('split-pane-right');
    const splitUrlInput = document.getElementById('split-url-input');
    const splitReloadBtn = document.getElementById('split-reload-btn');
    const splitGoBtn = document.getElementById('split-go-btn');
    const splitWebview = document.getElementById('split-webview');
    const titlebar = document.querySelector('.card-titlebar');
    const cardContent = document.querySelector('.card-content');
    const loadingWave = document.getElementById('loading-wave');
    const mediaHoverControl = document.getElementById('media-hover-control');
    const audioVisualizer = document.getElementById('audio-visualizer');
    const mediaToggleBtn = document.getElementById('media-toggle-btn');
    const mediaVolumeSlider = document.getElementById('media-volume-slider');
    const mediaVisualizerStyleBtn = document.getElementById('media-visualizer-style-btn');
    const mediaMuteBtn = document.getElementById('media-mute-btn');
    const mediaRemainingTime = document.getElementById('media-remaining-time');
    const mediaSeekBackBtn = document.getElementById('media-seek-back-btn');
    const mediaSeekForwardBtn = document.getElementById('media-seek-forward-btn');
    let challengeBannerEl = null;
    let visualizerEnabled = true;
    const VISUALIZER_STYLE_STORAGE_KEY = 'card_visualizer_style';
    const VISUALIZER_STYLES = [
      { key: 'bars', label: 'Bars' },
      { key: 'pulse', label: 'Pulse' },
      { key: 'ladder', label: 'Ladder' },
      { key: 'orbit', label: 'Orbit' },
    ];
    let activeVisualizerStyleKey = localStorage.getItem(VISUALIZER_STYLE_STORAGE_KEY) || 'bars';
    let lastActiveMediaWebview = null;
    let mediaBufferingOptimizationTimer = null;

    function startMediaBufferingOptimization() {
      if (mediaBufferingOptimizationTimer) return;
      mediaBufferingOptimizationTimer = setInterval(() => {
        optimizeSplitScreenVideoBuffering();
      }, 5000); // Check and optimize every 5 seconds
    }

    function stopMediaBufferingOptimization() {
      if (!mediaBufferingOptimizationTimer) return;
      clearInterval(mediaBufferingOptimizationTimer);
      mediaBufferingOptimizationTimer = null;
    }

    let mediaSyncTimer = null;
    let mediaSyncInFlight = false;
    let mediaVolumeDebounceTimer = null;
    let mediaRemainingTickTimer = null;
    let mediaRemainingSeconds = null;
    let mediaRemainingHasDuration = false;
    let mediaRemainingIsLive = false;
    let mediaRemainingIsPlaying = false;
    let lastBubbleMediaSignature = '';
    let mediaPanelOpen = false;
    const mediaPlayingState = new Map();
    const recentMediaStartAt = new WeakMap();
    const mediaScriptPending = new WeakMap();
    let securityLoadNoticeEl = null;
    let networkRecoveryWatcher = null;
    window._networkErrorActive = false;
    let isMinimizingCard = false;
    function waitForCardAnimationEnd(el, expectedName, fallbackMs) {
      return new Promise((resolve) => {
        if (!el) {
          resolve();
          return;
        }
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          el.removeEventListener('animationend', onEnd);
          resolve();
        };
        const onEnd = (evt) => {
          if (!evt || evt.target !== el) return;
          if (expectedName && evt.animationName !== expectedName) return;
          finish();
        };
        el.addEventListener('animationend', onEnd, { once: false });
        setTimeout(finish, fallbackMs);
      });
    }
    const cardDownloadRingBtn = document.getElementById('card-download-ring');
    const cardDownloadRingFg = cardDownloadRingBtn ? cardDownloadRingBtn.querySelector('.download-ring__fg') : null;

    // Track current page info for bookmarking
    let currentPageTitle = 'New Tab';
    let currentPageUrl = initialUrl || '';

    // Track current size state
    let isWideView = false;
    let isFullscreen = false;
    let originalBounds = null;
    let isSplitView = false;
    let currentSplitUrl = '';
    let zoomFactor = 1.0;
    const ZOOM_MIN = 0.5;
    const ZOOM_MAX = 3.0;
    const ZOOM_STEP = 0.1;
    let zoomHideTimer = null;

    const isCloudflareChallengeUrl = (rawUrl) => {
      try {
        const parsed = new URL(String(rawUrl || ''));
        const host = parsed.hostname.toLowerCase();
        if (host === 'challenges.cloudflare.com') return true;
        if (parsed.pathname.includes('/cdn-cgi/challenge-platform/')) return true;
      } catch (e) { }
      return false;
    };

    let lastNonChallengeUrl = '';

    // Track downloads for this card window
    const cardDownloads = new Map(); // id -> {receivedBytes,totalBytes,percent,state,filename,savePath,...}
    let ringDismissed = false; // User can dismiss the ring after interacting
    let loadingWaveVisible = false;
    let firstContentSeenForMainNav = false;
    let mainFirstContentFallbackTimer = null;

    function setLoadingWave(isActive) {
      if (!loadingWave) return;
      if (isActive) {
        loadingWave.classList.add('active');
        loadingWaveVisible = true;
      } else {
        loadingWave.classList.remove('active');
        loadingWaveVisible = false;
      }
    }

    function clearMainFirstContentFallback() {
      if (!mainFirstContentFallbackTimer) return;
      clearTimeout(mainFirstContentFallbackTimer);
      mainFirstContentFallbackTimer = null;
    }

    function hideLoadingWaveOnFirstContent(delayMs = 120) {
      isMainNavigationLoading = false;
      hideSecurityNoticeWhenAppropriate();
      clearMainLoadGuard();
      clearMainFirstContentFallback();
      if (!loadingWaveVisible) return;
      setTimeout(() => setLoadingWave(false), Math.max(0, Number(delayMs) || 0));
    }

    function scheduleMainFirstContentFallback() {
      clearMainFirstContentFallback();
      // Startup can miss the earliest dom-ready callback on some pages.
      // Use a short fallback so we don't keep the wave until full stop-loading.
      mainFirstContentFallbackTimer = setTimeout(() => {
        if (!isMainNavigationLoading || firstContentSeenForMainNav) return;
        firstContentSeenForMainNav = true;
        hideLoadingWaveOnFirstContent(0);
      }, 1000);
    }

    function ensureSecurityLoadNotice() {
      if (securityLoadNoticeEl) return securityLoadNoticeEl;
      if (!cardContent) return null;
      const el = document.createElement('div');
      el.className = 'security-load-notice';
      el.id = 'security-load-notice';
      el.setAttribute('role', 'alert');
      cardContent.appendChild(el);
      securityLoadNoticeEl = el;
      return el;

    function hideSecurityLoadNotice() {
      const el = ensureSecurityLoadNotice();
      if (!el) return;
      el.classList.remove('active');

    function setNetworkErrorActive(active) {
      window._networkErrorActive = active;
      if (!active) {

    function stopNetworkRecoveryWatcher() {
      if (!networkRecoveryWatcher) return;
      clearInterval(networkRecoveryWatcher);
      networkRecoveryWatcher = null;
    }

    function isNetworkNoticeMessage(message) {
      const text = String(message || '').toLowerCase();
      return text.includes('no internet connection') ||
        text.includes('connection lost') ||
        text.includes('check your network settings');
    }

    const OFFLINE_CONFIRMATION_MS = 6000;
    let offlineCandidateSince = 0;

    const CONNECTIVITY_PROBE_URLS = [
      'https://www.gstatic.com/generate_204',
      'https://clients3.google.com/generate_204',
      'https://www.msftconnecttest.com/connecttest.txt',
      'https://cloudflare.com/cdn-cgi/trace',
    ];

    function buildProbeUrl(base) {
      return `${base}${base.includes('?') ? '&' : '?'}t=${Date.now()}`;
    }

    async function probeInternetConnection(timeoutMs = 3500) {
      // Keep OS network state as a strong signal, but avoid hard-failing solely on one probe host.
      const browserOnline = !(navigator && navigator.onLine === false);
      if (!browserOnline) return false;

      const probeOne = async (baseUrl) => {
        const controller = new AbortController();
        const timer = setTimeout(() => {
          try { controller.abort(); } catch (e) { }
        }, timeoutMs);
        try {
          await fetch(buildProbeUrl(baseUrl), {
            method: 'GET',
            mode: 'no-cors',
            cache: 'no-store',
            credentials: 'omit',
            referrerPolicy: 'no-referrer',
            signal: controller.signal,
          });
          return true;
        } catch (e) {
          return false;
        } finally {
          clearTimeout(timer);
        }
      };

      try {
        const results = await Promise.all(CONNECTIVITY_PROBE_URLS.map((url) => probeOne(url)));
        if (results.some(Boolean)) return true;
      } catch (e) { }

      // If probes fail but browser still reports online, avoid a hard false-offline verdict.
      return browserOnline;
    }

    function updateOfflineCandidateState() {
      const offlineNow = !!(navigator && navigator.onLine === false);
      if (!offlineNow) {
        offlineCandidateSince = 0;
        return false;
      }
      if (!offlineCandidateSince) offlineCandidateSince = Date.now();
      return true;
    }

    async function isConfirmedOffline() {
      const offlineNow = updateOfflineCandidateState();
      if (!offlineNow) return false;
      if ((Date.now() - offlineCandidateSince) < OFFLINE_CONFIRMATION_MS) return false;
      const probeOnline = await probeInternetConnection(2500);
      return !probeOnline && !!(navigator && navigator.onLine === false);
    }

    async function recoverNetworkNoticeIfOnline() {
      if (!window._networkErrorActive) return false;
      const onlineNow = await probeInternetConnection();
      if (!onlineNow) return false;
      setNetworkErrorActive(false);
      hideSecurityLoadNotice();
      return true;
    }

    function startNetworkRecoveryWatcher() {
      if (networkRecoveryWatcher) return;
      networkRecoveryWatcher = setInterval(() => {
        recoverNetworkNoticeIfOnline();
      }, 4000);
    }

    function isHttpUrl(rawUrl) {
      const value = String(rawUrl || '').trim().toLowerCase();
      return value.startsWith('http://') || value.startsWith('https://');
    }

    const LOAD_GUARD_TIMEOUT_MS = 12000; // Reduced to 12 seconds to prevent long hangs with bad internet
    const LOAD_ABORT_TIMEOUT_MS = 20000; // Force abort after 20 seconds of stalled loading
    let mainLoadGuardTimer = null;
    let splitLoadGuardTimer = null;
    let mainAbortTimer = null;
    let splitAbortTimer = null;
    let isMainNavigationLoading = false;
    let isSplitNavigationLoading = false;

    function clearMainLoadGuard() {
      if (!mainLoadGuardTimer) return;
      clearTimeout(mainLoadGuardTimer);
      mainLoadGuardTimer = null;
    }

    function clearSplitLoadGuard() {
      if (!splitLoadGuardTimer) return;
      clearTimeout(splitLoadGuardTimer);
      splitLoadGuardTimer = null;
    }

    function clearMainAbortTimer() {
      if (!mainAbortTimer) return;

    function clearSplitAbortTimer() {
      if (!splitAbortTimer) return;
      clearTimeout(splitAbortTimer);
      splitAbortTimer = null;
    }

    async function handleStalledLoad(targetWebview, scopeLabel) {
      if (!targetWebview) return;
      const isSplitTarget = targetWebview === splitWebview;
      const navigationActive = isSplitTarget ? isSplitNavigationLoading : isMainNavigationLoading;
      if (!navigationActive) return;

      let stillLoading = true;
      try {
        if (typeof targetWebview.isLoading === 'function') {
          stillLoading = !!targetWebview.isLoading();
        }
      } catch (e) { }
      if (!stillLoading) return;

      const onlineNow = await probeInternetConnection(2500);
      const confirmedOffline = await isConfirmedOffline();
      if (!onlineNow && confirmedOffline) {
        showSecurityLoadNotice('No internet connection. Please check your network settings and try again.');
      } else {
        const prefix = scopeLabel ? `${scopeLabel} ` : '';
        showSecurityLoadNotice(`${prefix}Page is taking too long to load. The site may be slow, blocked, or your connection may be unstable. Try reloading.`);
      }

      if (loadingWaveVisible) {
        setLoadingWave(false);
      }
      pauseMediaSyncForFailure();

      // Schedule force-abort if still loading after showing notice
      if (isSplitTarget) {
        clearSplitAbortTimer();
        splitAbortTimer = setTimeout(() => {
          try {
            if (splitWebview && typeof splitWebview.stop === 'function') {
              console.warn('[Card] Force-stopping split webview after load timeout');
              splitWebview.stop();
            }
          } catch (e) { }
          clearSplitLoadGuard();
          isSplitNavigationLoading = false;
        }, LOAD_ABORT_TIMEOUT_MS - LOAD_GUARD_TIMEOUT_MS);
      } else {
        clearMainAbortTimer();
        mainAbortTimer = setTimeout(() => {
          try {
            if (webview && typeof webview.stop === 'function') {
              console.warn('[Card] Force-stopping webview after load timeout');
              webview.stop();
            }
          } catch (e) { }
          clearMainLoadGuard();
          isMainNavigationLoading = false;
        }, LOAD_ABORT_TIMEOUT_MS - LOAD_GUARD_TIMEOUT_MS);
      }
    }

    function startMainLoadGuard() {
      if (!isMainNavigationLoading) return;
      clearMainLoadGuard();
      mainLoadGuardTimer = setTimeout(() => {
        handleStalledLoad(webview, '');
      }, LOAD_GUARD_TIMEOUT_MS);
    }

    function startSplitLoadGuard() {
      if (!isSplitNavigationLoading) return;
      clearSplitLoadGuard();
      splitLoadGuardTimer = setTimeout(() => {
        handleStalledLoad(splitWebview, 'Split view');
      }, LOAD_GUARD_TIMEOUT_MS);
    }

    function hideSecurityNoticeWhenAppropriate(force = false) {
      if (force) {
        setNetworkErrorActive(false);
        hideSecurityLoadNotice();
        return;
      }
      if (window._networkErrorActive) {
        recoverNetworkNoticeIfOnline();
        return;
      }
      hideSecurityLoadNotice();
    }

    function showSecurityLoadNotice(message) {
      const el = ensureSecurityLoadNotice();
      if (!el) return;
      
      // Create dismissible notice with close button
      el.innerHTML = `
        <div style="display: flex; align-items: flex-start; gap: 10px; justify-content: space-between;">

          ">✕</button>

      const closeBtn = el.querySelector('#notice-close-btn');
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {

      // Keep network notices visible until a real connectivity probe confirms recovery.
      if (isNetworkNoticeMessage(message)) {

      }
