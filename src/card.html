<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Window</title>
 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Add initial animation state */
    @keyframes slideIn {
      from {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }

    .card-window {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      border-radius: 24px;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 50px 100px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    /* Shimmer effect on card appearance */
    .card-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      animation: shimmer 1.5s ease-in-out;
      pointer-events: none;
      z-index: 1000;
    }

    .card-titlebar {
      height: 48px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .card-titlebar:active {
      cursor: grabbing;
    }

    .title-text {
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      animation: fadeInSlide 0.5s ease 0.2s backwards;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      animation: fadeInSlide 0.5s ease 0.3s backwards;
    }

    .card-button {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card-button.size-btn {
      background: rgba(100, 200, 255, 0.7);
    }

    .card-button.minimize-btn {
      background: rgba(255, 200, 50, 0.7);
    }

    /* Bookmark button - white/transparent */
    .card-button.bookmark-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card-button.bookmark-btn.bookmarked {
      background: rgba(255, 215, 0, 0.8);
      border-color: rgba(255, 215, 0, 0.9);
    }

    .card-button:hover {
      background: rgba(255, 67, 67, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 67, 67, 0.4);
    }

    .card-button.size-btn:hover {
      background: rgba(67, 180, 255, 0.9);
      box-shadow: 0 4px 12px rgba(67, 180, 255, 0.4);
    }

    .card-button.minimize-btn:hover {
      background: rgba(255, 180, 30, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 180, 30, 0.4);
    }

    .card-button.bookmark-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }

    .card-button.bookmark-btn.bookmarked:hover {
      background: rgba(255, 215, 0, 0.95);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.6);
    }

    .card-button:active {
      background: rgba(255, 50, 50, 1);
      transform: scale(0.95);
    }

    .card-navbar {
      height: 60px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 10;
    }

    .nav-button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.12) translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-button:active {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.95);
    }

    .nav-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .url-input {
      flex: 1;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 0 12px;
      color: white;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      transition: all 0.3s ease;
    }

    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }

    .card-content {
      flex: 1;
      overflow: hidden;
      background: white;
      position: relative;
      animation: contentFadeIn 0.6s ease 0.3s backwards;
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .loading-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #f093fb, #667eea);
      background-size: 200% 100%;
      animation: gradientShift 2s ease-in-out infinite;
      z-index: 100;
      display: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
    }

    .loading-indicator.active {
      display: block;
    }

    @keyframes gradientShift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .loading-spinner.active {
      display: block;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Pulse effect for active elements */
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
      }
    }

    webview {
      animation: webviewFadeIn 0.8s ease 0.4s backwards;
    }

    @keyframes webviewFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideOut {
      to {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card-window">
    <!-- Titlebar with navigation and close button -->
    <div class="card-titlebar">
      <div style="display:flex; align-items:center; gap:8px; -webkit-app-region: no-drag;">
        <button class="card-button" id="back-btn" title="Back">←</button>
        <button class="card-button" id="forward-btn" title="Forward">→</button>
        <button class="card-button" id="reload-btn" title="Reload">↻</button>
        <button class="card-button size-btn" id="wide-btn" title="Wide View (800px)">⇔</button>
        <button class="card-button size-btn" id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
        <button class="card-button minimize-btn" id="minimize-btn" title="Minimize">−</button>
        <button class="card-button bookmark-btn" id="bookmark-btn" title="Bookmark">🔖</button>
      </div>
      <span class="title-text">New Tab</span>
      <div class="card-controls">
        <input type="text" class="url-input" id="url-input" placeholder="Enter URL or search..." style="margin-right:8px;">
        <button class="card-button" id="close-btn" title="Close">✕</button>
      </div>
    </div>

    <!-- Content area: use webview for full site navigation -->
    <div class="card-content">
      <webview id="card-webview" style="width:100%; height:100%;" partition="persist:cards" allowpopups></webview>
    </div>
  </div>

  <script>
    // Get card ID and initial URL from query parameters
    const params = new URLSearchParams(window.location.search);
    let cardId = params.get('cardId');
    cardId = parseInt(cardId, 10);
    const encodedUrl = params.get('url');
    let initialUrl = null;
    if (encodedUrl) {
      try {
        initialUrl = atob(encodedUrl);
      } catch (e) {
        initialUrl = decodeURIComponent(encodedUrl);
      }
    }

    // Get DOM elements
    const closeBtn = document.getElementById('close-btn');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const wideBtn = document.getElementById('wide-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const minimizeBtn = document.getElementById('minimize-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    const urlInput = document.getElementById('url-input');
    const titleElement = document.querySelector('.title-text');
    const webview = document.getElementById('card-webview');
    const titlebar = document.querySelector('.card-titlebar');

    // Track current page info for bookmarking
    let currentPageTitle = 'New Tab';
    let currentPageUrl = initialUrl || '';

    // Track current size state
    let isWideView = false;
    let isFullscreen = false;
    let originalBounds = null;

    // Load initial URL if provided
    if (initialUrl) {
      webview.src = initialUrl;
      urlInput.value = initialUrl;
      currentPageUrl = initialUrl;
    }

    // Update URL and title when webview navigates
    webview.addEventListener('did-navigate', (e) => {
      try { 
        urlInput.value = e.url;
        currentPageUrl = e.url;
        checkBookmarkStatus();
      } catch (err) {}
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      try { 
        urlInput.value = e.url;
        currentPageUrl = e.url;
        checkBookmarkStatus();
      } catch (err) {}
    });

    webview.addEventListener('page-title-updated', (e) => {
      try { 
        titleElement.textContent = e.title;
        currentPageTitle = e.title;
        checkBookmarkStatus();
      } catch (err) {}
    });

    // Check if current page is bookmarked
    async function checkBookmarkStatus() {
      if (window.cardAPI && window.cardAPI.isBookmarked && currentPageUrl) {
        try {
          const isBookmarked = await window.cardAPI.isBookmarked(currentPageUrl);
          if (isBookmarked) {
            bookmarkBtn.classList.add('bookmarked');
            bookmarkBtn.title = 'Remove Bookmark';
          } else {
            bookmarkBtn.classList.remove('bookmarked');
            bookmarkBtn.title = 'Bookmark';
          }
        } catch (err) {
          console.error('Error checking bookmark status:', err);
        }
      }
    }

    // Intercept new-window events
    webview.addEventListener('new-window', (e) => {
      e.preventDefault();
      const url = e.url;
      if (url) {
        try {
          webview.loadURL(url);
          urlInput.value = url;
          currentPageUrl = url;
        } catch (err) {
          console.error('Failed to load URL in webview:', err);
        }
      }
    });

    // Listen for load URL requests
    window.addEventListener('card-load-url', (ev) => {
      const target = ev.detail;
      try {
        if (target) {
          webview.loadURL(target);
          urlInput.value = target;
          currentPageUrl = target;
        }
      } catch (err) {
        console.error('Failed to load url into webview:', err);
      }
    });

    // Dragging functionality
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.closest('.card-controls')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      const pos = window.cardAPI.getWindowPosition();
      window.cardAPI.updateWindowPosition(
        pos.x + deltaX,
        pos.y + deltaY,
        cardId
      );

      startX = e.clientX;
      startY = e.clientY;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Button click handlers with visual feedback
    closeBtn.addEventListener('click', async () => {
      // Add exit animation
      const cardWindow = document.querySelector('.card-window');
      cardWindow.style.animation = 'slideOut 0.3s ease forwards';
      
      setTimeout(async () => {
        try {
          await window.cardAPI.closeCard(cardId);
        } catch (err) {
          console.error('Error closing card:', err);
        }
      }, 300);
    });

    backBtn.addEventListener('click', () => {
      try {
        webview.goBack();
      } catch (e) {
        window.cardAPI.cardGoBack(cardId);
      }
    });

    forwardBtn.addEventListener('click', () => {
      try {
        webview.goForward();
      } catch (e) {
        window.cardAPI.cardGoForward(cardId);
      }
    });

    reloadBtn.addEventListener('click', () => {
      // Add spin animation on reload
      reloadBtn.style.animation = 'spin 0.6s ease';
      setTimeout(() => {
        reloadBtn.style.animation = '';
      }, 600);
      
      try {
        webview.reload();
      } catch (e) {
        window.cardAPI.cardReload(cardId);
      }
    });

    // Wide view button (1000px width)
    wideBtn.addEventListener('click', async () => {
      try {
        if (!isWideView) {
          // Save current bounds before going wide
          const pos = window.cardAPI.getWindowPosition();
          originalBounds = {
            x: pos.x,
            y: pos.y,
            width: 650,
            height: 500
          };

          // Calculate centered position for wider window
          const screenWidth = window.screen.availWidth;
          const newX = Math.floor((screenWidth - 1000) / 2);

          await window.cardAPI.resizeCard(cardId, newX, pos.y, 1000, 600);
          isWideView = true;
          wideBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          wideBtn.title = 'Normal View (650px)';
        } else {
          // Restore original size
          if (originalBounds) {
            await window.cardAPI.resizeCard(
              cardId, 
              originalBounds.x, 
              originalBounds.y, 
              originalBounds.width, 
              originalBounds.height
            );
          }
          isWideView = false;
          wideBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          wideBtn.title = 'Wide View (800px)';
        }
      } catch (err) {
        console.error('Error resizing card:', err);
      }
    });

    // Fullscreen toggle button
    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!isFullscreen) {
          // Save current bounds before fullscreen
          const pos = window.cardAPI.getWindowPosition();
          if (!originalBounds) {
            originalBounds = {
              x: pos.x,
              y: pos.y,
              width: 650,
              height: 500
            };
          }

          await window.cardAPI.toggleFullscreen(cardId, true);
          isFullscreen = true;
          fullscreenBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          fullscreenBtn.textContent = '⛶';
          fullscreenBtn.title = 'Exit Fullscreen';
        } else {
          await window.cardAPI.toggleFullscreen(cardId, false);
          
          // Restore original size after exiting fullscreen
          if (originalBounds && !isWideView) {
            setTimeout(async () => {
              await window.cardAPI.resizeCard(
                cardId,
                originalBounds.x,
                originalBounds.y,
                originalBounds.width,
                originalBounds.height
              );
            }, 100);
          }
          
          isFullscreen = false;
          fullscreenBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          fullscreenBtn.title = 'Toggle Fullscreen';
        }
      } catch (err) {
        console.error('Error toggling fullscreen:', err);
      }
    });

    // Minimize button handler
    minimizeBtn.addEventListener('click', async () => {
      try {
        await window.cardAPI.minimizeCard(cardId);
      } catch (err) {
        console.error('Error minimizing card:', err);
      }
    });

    // Bookmark button handler
    bookmarkBtn.addEventListener('click', async () => {
      try {
        const isBookmarked = await window.cardAPI.isBookmarked(currentPageUrl);

        if (isBookmarked) {
          // Already bookmarked - remove it directly
          await window.cardAPI.toggleBookmark({
            url: currentPageUrl,
            title: currentPageTitle,
            timestamp: Date.now()
          });
          await checkBookmarkStatus();
        } else {
          // Not bookmarked - show confirmation modal on this card
          const folders = await window.cardAPI.getBookmarkFolders();
          showBookmarkModal(folders);
        }
      } catch (err) {
        console.error('Error toggling bookmark:', err);
      }
    });

    // --- Bookmark confirmation modal (rendered on the card) ---
    function showBookmarkModal(folders) {
      // Build modal HTML
      let folderPickerHTML = '';
      if (folders.length >= 2) {
        folderPickerHTML = `
          <label style="color: rgba(255,255,255,0.7); font-size: 11px; display: block; margin-bottom: 6px;">Save to folder:</label>
          <div id="bm-folder-options" style="display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; margin-bottom: 12px;"></div>
        `;
      }

      const modal = document.createElement('div');
      modal.id = 'bm-modal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center;';
      modal.innerHTML = `
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
          <h3 style="color: white; margin: 0 0 6px 0; font-size: 14px;">Add Bookmark</h3>
          <p style="color: rgba(255,255,255,0.7); font-size: 11px; margin: 0 0 14px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${currentPageTitle || currentPageUrl}</p>
          ${folderPickerHTML}
          <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button id="bm-cancel" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; cursor: pointer;">Cancel</button>
            <button id="bm-ok" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; cursor: pointer;">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      // Build folder options if 2+ folders
      let selectedFolderId = folders.length > 0 ? folders[0].id : null;

      if (folders.length >= 2) {
        const optionsContainer = modal.querySelector('#bm-folder-options');
        folders.forEach((folder, index) => {
          const option = document.createElement('div');
          option.style.cssText = 'display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); transition: all 0.15s ease;';
          option.innerHTML = `<span style="font-size: 13px;">📁</span><span style="color: white; font-size: 11px; flex: 1;">${folder.name}</span><span style="color: rgba(255,255,255,0.4); font-size: 10px;">${folder.count}</span>`;

          // Highlight first folder by default
          if (index === 0) {
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
          }

          option.addEventListener('click', () => {
            optionsContainer.querySelectorAll('div').forEach(el => {
              el.style.background = 'rgba(255,255,255,0.08)';
              el.style.borderColor = 'rgba(255,255,255,0.1)';
            });
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
            selectedFolderId = folder.id;
          });

          optionsContainer.appendChild(option);
        });
      }

      // Cancel
      modal.querySelector('#bm-cancel').addEventListener('click', () => {
        modal.remove();
      });

      // Add / OK
      modal.querySelector('#bm-ok').addEventListener('click', async () => {
        modal.remove();
        try {
          await window.cardAPI.saveBookmarkToFolder({
            url: currentPageUrl,
            title: currentPageTitle,
            timestamp: Date.now()
          }, selectedFolderId);
          await checkBookmarkStatus();
          showBookmarkToast();
        } catch (err) {
          console.error('Error saving bookmark:', err);
        }
      });
    }

    // Toast confirmation after saving
    function showBookmarkToast() {
      const toast = document.createElement('div');
      toast.style.cssText = 'position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 18px; border-radius: 16px; font-size: 12px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap;';
      toast.textContent = '✓ Bookmark saved';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // URL input handler
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const url = urlInput.value.trim();
        if (url) {
          let targetUrl = url;
          if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
            targetUrl = 'https://' + targetUrl;
          }
          try {
            webview.loadURL(targetUrl);
            currentPageUrl = targetUrl;
          } catch (err) {
            window.cardAPI.navigateCard(cardId, targetUrl);
          }
        }
      }
    });

    // --- Password Manager: listen for credentials detected by main process ---
    if (window.cardAPI && window.cardAPI.onPasswordDetected) {
      window.cardAPI.onPasswordDetected(function(data) {
        if (data && data.password) {
          showPasswordPrompt(data.username || '', data.password, data.site || currentPageUrl);
        }
      });
    }

    function showPasswordPrompt(username, password, site) {
      // Don't stack duplicates
      const existing = document.getElementById('pwd-prompt');
      if (existing) existing.remove();

      const promptSite = site || currentPageUrl;

      const prompt = document.createElement('div');
      prompt.id = 'pwd-prompt';
      prompt.style.cssText = 'position: absolute; top: 0; left: 0; right: 0; z-index: 8888; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid rgba(255,255,255,0.12); padding: 9px 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 3px 12px rgba(0,0,0,0.4);';

      let hostname = promptSite;
      try { hostname = new URL(promptSite).hostname; } catch(e) {}

      prompt.innerHTML = `
        <span style="font-size: 18px; flex-shrink: 0;">🔐</span>
        <div style="flex: 1; min-width: 0;">
          <div style="color: white; font-size: 11px; font-weight: 600;">Save password for <span style="color: #7edbff;">${hostname}</span>?</div>
          <div style="color: rgba(255,255,255,0.45); font-size: 9.5px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${username || '(no username)'} &nbsp;•&nbsp; ••••••••</div>
        </div>
        <button id="pwd-save-btn" style="background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 5px 12px; border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0;">Save</button>
        <button id="pwd-dismiss-btn" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); padding: 5px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; flex-shrink: 0;">✕</button>
      `;

      // Insert prompt inside .card-window, right after titlebar
      const cardWindow = document.querySelector('.card-window');
      const titlebar = document.querySelector('.card-titlebar');
      cardWindow.style.position = 'relative';
      titlebar.after(prompt);

      // Save
      prompt.querySelector('#pwd-save-btn').addEventListener('click', async () => {
        prompt.remove();
        try {
          await window.cardAPI.savePassword({
            site: promptSite,
            username: username,
            password: password,
            timestamp: Date.now()
          });
          // Show toast
          const toast = document.createElement('div');
          toast.style.cssText = 'position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 18px; border-radius: 16px; font-size: 12px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap;';
          toast.textContent = '✓ Password saved';
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 2000);
        } catch(err) {
          console.error('Error saving password:', err);
        }
      });

      // Dismiss
      prompt.querySelector('#pwd-dismiss-btn').addEventListener('click', () => {
        prompt.remove();
      });

      // Auto-dismiss after 12s
      setTimeout(() => { if (prompt.parentNode) prompt.remove(); }, 12000);
    }

    // Check bookmark status on load
    setTimeout(checkBookmarkStatus, 1000);
  </script>
</body>
</html>
