

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Window</title>
 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Add initial animation state */
    @keyframes slideIn {
      from {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }

    .card-window {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      border-radius: 24px;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 50px 100px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    /* Shimmer effect on card appearance */
    .card-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      animation: shimmer 1.5s ease-in-out;
      pointer-events: none;
      z-index: 1000;
    }

    .card-titlebar {
      height: 48px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .card-titlebar:active {
      cursor: grabbing;
    }

    .title-text {
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      animation: fadeInSlide 0.5s ease 0.2s backwards;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      animation: fadeInSlide 0.5s ease 0.3s backwards;
    }

    .card-button {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card-button.size-btn {
      background: rgba(100, 200, 255, 0.7);
    }

    .card-button:hover {
      background: rgba(255, 67, 67, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 67, 67, 0.4);
    }

    .card-button.size-btn:hover {
      background: rgba(67, 180, 255, 0.9);
      box-shadow: 0 4px 12px rgba(67, 180, 255, 0.4);
    }

    .card-button:active {
      background: rgba(255, 50, 50, 1);
      transform: scale(0.95);
    }

    .card-navbar {
      height: 60px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 10;
    }

    .nav-button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.12) translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-button:active {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.95);
    }

    .nav-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .url-input {
      flex: 1;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 0 12px;
      color: white;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      transition: all 0.3s ease;
    }

    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }

    .card-content {
      flex: 1;
      overflow: hidden;
      background: white;
      position: relative;
      animation: contentFadeIn 0.6s ease 0.3s backwards;
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .loading-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #f093fb, #667eea);
      background-size: 200% 100%;
      animation: gradientShift 2s ease-in-out infinite;
      z-index: 100;
      display: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
    }

    .loading-indicator.active {
      display: block;
    }

    @keyframes gradientShift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .loading-spinner.active {
      display: block;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Pulse effect for active elements */
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
      }
    }

    webview {
      animation: webviewFadeIn 0.8s ease 0.4s backwards;
    }

    @keyframes webviewFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="card-window">
    <!-- Titlebar with navigation and close button -->
    <div class="card-titlebar">
      <div style="display:flex; align-items:center; gap:8px; -webkit-app-region: no-drag;">
        <button class="card-button" id="back-btn" title="Back">←</button>
        <button class="card-button" id="forward-btn" title="Forward">→</button>
        <button class="card-button" id="reload-btn" title="Reload">↻</button>
        <button class="card-button size-btn" id="wide-btn" title="Wide View (800px)">⇔</button>
        <button class="card-button size-btn" id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
      </div>
      <span class="title-text">New Tab</span>
      <div class="card-controls">
        <input type="text" class="url-input" id="url-input" placeholder="Enter URL or search..." style="margin-right:8px;">
        <button class="card-button" id="close-btn" title="Close">✕</button>
      </div>
    </div>

    <!-- Content area: use webview for full site navigation -->
    <div class="card-content">
      <webview id="card-webview" style="width:100%; height:100%;" partition="persist:cards" allowpopups></webview>
    </div>
  </div>

  <script>
    // Get card ID and initial URL from query parameters
    const params = new URLSearchParams(window.location.search);
    let cardId = params.get('cardId');
    cardId = parseInt(cardId, 10);
    const encodedUrl = params.get('url');
    let initialUrl = null;
    if (encodedUrl) {
      try {
        initialUrl = atob(encodedUrl);
      } catch (e) {
        initialUrl = decodeURIComponent(encodedUrl);
      }
    }

    // Get DOM elements
    const closeBtn = document.getElementById('close-btn');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const wideBtn = document.getElementById('wide-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const urlInput = document.getElementById('url-input');
    const titleElement = document.querySelector('.title-text');
    const webview = document.getElementById('card-webview');
    const titlebar = document.querySelector('.card-titlebar');

    // Track current size state
    let isWideView = false;
    let isFullscreen = false;
    let originalBounds = null;

    // Load initial URL if provided
    if (initialUrl) {
      webview.src = initialUrl;
      urlInput.value = initialUrl;
    }

    // Update URL and title when webview navigates
    webview.addEventListener('did-navigate', (e) => {
      try { urlInput.value = e.url; } catch (err) {}
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      try { urlInput.value = e.url; } catch (err) {}
    });

    webview.addEventListener('page-title-updated', (e) => {
      try { titleElement.textContent = e.title; } catch (err) {}
    });

    // Intercept new-window events
    webview.addEventListener('new-window', (e) => {
      e.preventDefault();
      const url = e.url;
      if (url) {
        try {
          webview.loadURL(url);
          urlInput.value = url;
        } catch (err) {
          console.error('Failed to load URL in webview:', err);
        }
      }
    });

    // Listen for load URL requests
    window.addEventListener('card-load-url', (ev) => {
      const target = ev.detail;
      try {
        if (target) {
          webview.loadURL(target);
          urlInput.value = target;
        }
      } catch (err) {
        console.error('Failed to load url into webview:', err);
      }
    });

    // Dragging functionality
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.closest('.card-controls')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      const pos = window.cardAPI.getWindowPosition();
      window.cardAPI.updateWindowPosition(
        pos.x + deltaX,
        pos.y + deltaY,
        cardId
      );

      startX = e.clientX;
      startY = e.clientY;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Button click handlers with visual feedback
    closeBtn.addEventListener('click', async () => {
      // Add exit animation
      const cardWindow = document.querySelector('.card-window');
      cardWindow.style.animation = 'slideOut 0.3s ease forwards';
      
      setTimeout(async () => {
        try {
          await window.cardAPI.closeCard(cardId);
        } catch (err) {
          console.error('Error closing card:', err);
        }
      }, 300);
    });

    // Add exit animation keyframe
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideOut {
        to {
          transform: scale(0.8) translateY(20px);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    backBtn.addEventListener('click', () => {
      try {
        webview.goBack();
      } catch (e) {
        window.cardAPI.cardGoBack(cardId);
      }
    });

    forwardBtn.addEventListener('click', () => {
      try {
        webview.goForward();
      } catch (e) {
        window.cardAPI.cardGoForward(cardId);
      }
    });

    reloadBtn.addEventListener('click', () => {
      // Add spin animation on reload
      reloadBtn.style.animation = 'spin 0.6s ease';
      setTimeout(() => {
        reloadBtn.style.animation = '';
      }, 600);
      
      try {
        webview.reload();
      } catch (e) {
        window.cardAPI.cardReload(cardId);
      }
    });

    // Wide view button (1000px width)
    wideBtn.addEventListener('click', async () => {
      try {
        if (!isWideView) {
          // Save current bounds before going wide
          const pos = window.cardAPI.getWindowPosition();
          originalBounds = {
            x: pos.x,
            y: pos.y,
            width: 650,
            height: 500
          };

          // Calculate centered position for wider window
          const screenWidth = window.screen.availWidth;
          const newX = Math.floor((screenWidth - 1000) / 2);

          await window.cardAPI.resizeCard(cardId, newX, pos.y, 1000, 600);
          isWideView = true;
          wideBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          wideBtn.title = 'Normal View (650px)';
        } else {
          // Restore original size
          if (originalBounds) {
            await window.cardAPI.resizeCard(
              cardId, 
              originalBounds.x, 
              originalBounds.y, 
              originalBounds.width, 
              originalBounds.height
            );
          }
          isWideView = false;
          wideBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          wideBtn.title = 'Wide View (800px)';
        }
      } catch (err) {
        console.error('Error resizing card:', err);
      }
    });

    // Fullscreen toggle button
    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!isFullscreen) {
          // Save current bounds before fullscreen
          const pos = window.cardAPI.getWindowPosition();
          if (!originalBounds) {
            originalBounds = {
              x: pos.x,
              y: pos.y,
              width: 650,
              height: 500
            };
          }

          await window.cardAPI.toggleFullscreen(cardId, true);
          isFullscreen = true;
          fullscreenBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          fullscreenBtn.textContent = '⛶';
          fullscreenBtn.title = 'Exit Fullscreen';
        } else {
          await window.cardAPI.toggleFullscreen(cardId, false);
          
          // Restore original size after exiting fullscreen
          if (originalBounds && !isWideView) {
            setTimeout(async () => {
              await window.cardAPI.resizeCard(
                cardId,
                originalBounds.x,
                originalBounds.y,
                originalBounds.width,
                originalBounds.height
              );
            }, 100);
          }
          
          isFullscreen = false;
          fullscreenBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          fullscreenBtn.title = 'Toggle Fullscreen';
        }
      } catch (err) {
        console.error('Error toggling fullscreen:', err);
      }
    });

    // URL input handler
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const url = urlInput.value.trim();
        if (url) {
          let targetUrl = url;
          if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
            targetUrl = 'https://' + targetUrl;
          }
          try {
            webview.loadURL(targetUrl);
          } catch (err) {
            window.cardAPI.navigateCard(cardId, targetUrl);
          }
        }
      }
    });
   


  </script>
</body>
</html>
