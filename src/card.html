<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Window</title>

  <!-- Performance optimizations -->
  <meta http-equiv="x-dns-prefetch-control" content="on">
  <link rel="dns-prefetch" href="//www.google.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="preconnect" href="https://www.google.com">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Spring open/close card motion - simplified for GPU */
    @keyframes springPopIn {
      0% {
        transform: scale(0.28) translateY(34px) translateZ(0);
        opacity: 0;
      }

      58% {
        transform: scale(1.08) translateY(-6px) translateZ(0);
        opacity: 1;
      }

      78% {
        transform: scale(0.96) translateY(2px) translateZ(0);
      }

      100% {
        transform: scale(1) translateY(0) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes springPopOut {
      0% {
        transform: scale(1) translateY(0) translateZ(0);
        opacity: 1;
      }

      34% {
        transform: scale(1.06) translateY(-4px) translateZ(0);
        opacity: 1;
      }

      100% {
        transform: scale(0.24) translateY(28px) translateZ(0);
        opacity: 0;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .card-window {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      border-radius: 24px;
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 50px 100px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      /* Simplified animation duration for GPU */
      animation: springPopIn 400ms cubic-bezier(0.19, 1.2, 0.32, 1) both;
      position: relative;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    /* Shimmer effect on card appearance */
    .card-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent);
      animation: shimmer 1.5s ease-in-out;
      pointer-events: none;
      z-index: 1000;
    }

    .card-window.is-minimizing {
      /* Simplified animation for GPU */
      animation: springPopOut 200ms ease-out forwards;
      pointer-events: none;
    }

    .card-window.is-restoring {
      /* Simplified animation for GPU */
      animation: springPopIn 350ms cubic-bezier(0.19, 1.2, 0.32, 1) both;
      pointer-events: auto;
    }

    .card-titlebar {
      height: 48px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .theme-sunset .card-titlebar,
    .theme-alt .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 80, 150, 0.45), rgba(255, 70, 70, 0.45));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-ocean .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 198, 255, 0.42), rgba(0, 114, 255, 0.44));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-emerald .card-titlebar {
      background: linear-gradient(135deg, rgba(14, 142, 70, 0.62), rgba(58, 191, 92, 0.55));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-amber .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 140, 30, 0.65), rgba(255, 92, 24, 0.58));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-midnight .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.92), rgba(18, 18, 18, 0.88));
      border-bottom: 2px solid rgba(255, 255, 255, 0.18);
    }

    .theme-cocoa .card-titlebar {
      background: linear-gradient(135deg, rgba(76, 42, 24, 0.92), rgba(132, 78, 46, 0.88));
      border-bottom: 2px solid rgba(255, 220, 190, 0.22);
    }

    .card-titlebar:active {
      cursor: default;
    }

    .title-text {
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      animation: fadeInSlide 0.5s ease 0.2s backwards;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-10px) translateZ(0);
      }

      to {
        opacity: 1;
        transform: translateX(0) translateZ(0);
      }
    }

    .card-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      /* Simplified animation for GPU */
      animation: fadeInSlide 0.3s ease 0.2s backwards;
    }

    .card-button {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .card-button.size-btn {
      background: rgba(100, 200, 255, 0.7);
    }

    .card-button.minimize-btn {
      background: rgba(255, 200, 50, 0.7);
    }

    /* Bookmark button - white/transparent */
    .card-button.bookmark-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card-button.bookmark-btn.bookmarked {
      background: rgba(255, 215, 0, 0.8);
      border-color: rgba(255, 215, 0, 0.9);
    }

    .card-button:hover {
      background: rgba(255, 67, 67, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 67, 67, 0.4);
    }

    .card-button.size-btn:hover {
      background: rgba(67, 180, 255, 0.9);
      box-shadow: 0 4px 12px rgba(67, 180, 255, 0.4);
    }

    .card-button.minimize-btn:hover {
      background: rgba(255, 180, 30, 0.9);
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 4px 12px rgba(255, 180, 30, 0.4);
    }

    .card-button.bookmark-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }

    .card-button.bookmark-btn.bookmarked:hover {
      background: rgba(255, 215, 0, 0.95);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.6);
    }

    .card-button:active {
      background: rgba(255, 50, 50, 1);
      transform: scale(0.95);
    }

    /* Download ring styling inside card */
    .download-ring__bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.25);
      stroke-width: 3.2;
    }

    .download-ring__fg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-dasharray: 97.4;
      stroke-dashoffset: 97.4;
      transition: stroke-dashoffset 0.15s ease;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    .download-ring.indeterminate .download-ring__fg {
      stroke-dasharray: 24, 97.4;
      stroke-dashoffset: 0;
      animation: downloadRingSpin 1s linear infinite;
    }

    .download-ring.completed .download-ring__fg {
      stroke: rgba(100, 255, 100, 0.95);
    }

    .download-ring.completed .download-ring__icon {
      color: rgba(100, 255, 100, 1);
    }

    @keyframes downloadRingSpin {
      to {
        transform: rotate(270deg) translateZ(0);
      }
    }

    .card-navbar {
      height: 60px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 10;
      /* GPU acceleration */
      transform: translateZ(0);
    }

    .nav-button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.12) translateY(-2px) translateZ(0);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-button:active {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.95) translateZ(0);
    }

    .nav-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .url-input {
      flex: 1;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 0 12px;
      color: white;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      /* Simplified transition for GPU */
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      transform: translateZ(0);
    }

    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      transform: scale(1.02) translateZ(0);
    }

    .card-content {
      flex: 1;
      overflow: hidden;
      background: white;
      position: relative;
      animation: contentFadeIn 0.6s ease 0.3s backwards;
    }

    .security-load-notice {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 12px;
      z-index: 40;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 180, 120, 0.55);
      background: linear-gradient(135deg, rgba(64, 24, 0, 0.92), rgba(38, 16, 0, 0.9));
      color: rgba(255, 236, 214, 0.96);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
      font-size: 11px;
      line-height: 1.45;
      backdrop-filter: blur(4px);
      display: none;
      -webkit-app-region: no-drag;
    }

    .security-load-notice.active {
      display: block;
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: scale(0.98) translateZ(0);
      }

      to {
        opacity: 1;
        transform: scale(1) translateZ(0);
      }
    }

    .loading-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #f093fb, #667eea);
      background-size: 200% 100%;
      /* Simplified animation for GPU */
      animation: gradientShift 1.5s ease-in-out infinite;
      z-index: 100;
      display: none;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
      will-change: background-position;
    }

    .loading-indicator.active {
      display: block;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-top: 3px solid #667eea;
      border-radius: 50%;
      /* Simplified animation for GPU */
      animation: spin 0.8s linear infinite;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      will-change: transform;
    }

    .loading-spinner.active {
      display: block;
    }

    @keyframes spin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) translateZ(0);
      }

      100% {
        transform: translate(-50%, -50%) rotate(360deg) translateZ(0);
      }
    }

    /* Pulse effect for active elements - simplified */
    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(102, 126, 234, 0);
      }
    }

    webview {
      /* Simplified animation for GPU */
      animation: webviewFadeIn 0.4s ease-out 0.2s backwards;
    }

    @keyframes webviewFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideOut {
      to {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
    }

    .loading-wave {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 50%, rgba(120, 255, 214, 0.9) 0%, rgba(120, 255, 214, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 40% 50%, rgba(120, 180, 255, 0.9) 0%, rgba(120, 180, 255, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 70% 50%, rgba(255, 120, 240, 0.9) 0%, rgba(255, 120, 240, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(102, 126, 234, 0.0), rgba(240, 147, 251, 0.75), rgba(102, 126, 234, 0.0)) 0 0 / 220px 100%;
      animation: waveDrift 1.2s linear infinite;
      filter: drop-shadow(0 2px 6px rgba(102, 126, 234, 0.6));
    }

    .theme-sunset .loading-wave,
    .theme-alt .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(255, 120, 200, 0.85) 0%, rgba(255, 120, 200, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(255, 110, 110, 0.85) 0%, rgba(255, 110, 110, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(255, 170, 210, 0.85) 0%, rgba(255, 170, 210, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(255, 80, 150, 0.0), rgba(255, 70, 70, 0.75), rgba(255, 80, 150, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(255, 80, 150, 0.55));
    }

    .theme-ocean .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(100, 230, 255, 0.86) 0%, rgba(100, 230, 255, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(80, 160, 255, 0.86) 0%, rgba(80, 160, 255, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(120, 210, 255, 0.86) 0%, rgba(120, 210, 255, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(0, 198, 255, 0.0), rgba(0, 114, 255, 0.78), rgba(0, 198, 255, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(0, 156, 255, 0.52));
    }

    .theme-emerald .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(85, 250, 180, 0.84) 0%, rgba(85, 250, 180, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(40, 210, 170, 0.84) 0%, rgba(40, 210, 170, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(110, 255, 205, 0.84) 0%, rgba(110, 255, 205, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(17, 153, 142, 0.0), rgba(56, 239, 125, 0.78), rgba(17, 153, 142, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(56, 239, 125, 0.5));
    }

    .theme-amber .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(255, 180, 110, 0.86) 0%, rgba(255, 180, 110, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(255, 125, 110, 0.86) 0%, rgba(255, 125, 110, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(255, 210, 150, 0.86) 0%, rgba(255, 210, 150, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(255, 153, 102, 0.0), rgba(255, 94, 98, 0.78), rgba(255, 153, 102, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(255, 130, 90, 0.5));
    }

    .theme-midnight .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(160, 160, 170, 0.72) 0%, rgba(160, 160, 170, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(90, 90, 100, 0.78) 0%, rgba(90, 90, 100, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(130, 130, 140, 0.74) 0%, rgba(130, 130, 140, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(18, 18, 22, 0.0), rgba(58, 58, 66, 0.86), rgba(18, 18, 22, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.58));
    }

    .theme-cocoa .loading-wave {
      background:
        radial-gradient(circle at 12% 50%, rgba(196, 146, 106, 0.82) 0%, rgba(196, 146, 106, 0.0) 55%) 0 0 / 120px 100%,
        radial-gradient(circle at 45% 50%, rgba(166, 109, 67, 0.84) 0%, rgba(166, 109, 67, 0.0) 55%) 0 0 / 140px 100%,
        radial-gradient(circle at 72% 50%, rgba(230, 182, 136, 0.78) 0%, rgba(230, 182, 136, 0.0) 55%) 0 0 / 160px 100%,
        linear-gradient(90deg, rgba(110, 72, 44, 0.0), rgba(166, 123, 91, 0.8), rgba(110, 72, 44, 0.0)) 0 0 / 220px 100%;
      filter: drop-shadow(0 2px 6px rgba(135, 86, 48, 0.52));
    }

    .loading-wave.active {
      opacity: 1;
      transform: translateY(0) translateZ(0);
    }

    @keyframes waveDrift {
      0% {
        background-position: 0 0, 0 0, 0 0, 0 0;
      }

      100% {
        background-position: 240px 0, -280px 0, 320px 0, -220px 0;
      }
    }

    .media-hover-control {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 20;
      -webkit-app-region: no-drag;
      opacity: 0;
      pointer-events: none;
      /* Simplified transition for GPU */
      transition: opacity 0.2s ease, transform 0.2s ease;
      /* GPU acceleration */
      transform: translateX(-50%) translateZ(0);
      will-change: transform, opacity;
    }

    .media-hover-control.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .audio-visualizer {
      height: 28px;
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-app-region: no-drag;
      /* GPU acceleration */
      transform: translateZ(0);
      will-change: transform;
    }

    .audio-visualizer:hover,
    .media-hover-control.panel-open .audio-visualizer {
      transform: translateY(-1px) translateZ(0);
      background: rgba(10, 20, 30, 0.88);
      border-color: rgba(124, 247, 255, 0.5);
      box-shadow: 0 10px 22px rgba(10, 20, 30, 0.55);
    }

    .audio-visualizer span {
      width: 4px;
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(180deg, #7cf7ff 0%, #7b8bff 50%, #ff6ff0 100%);
      /* Simplified animation for GPU - reduced complexity */
      animation: audioPulse 1.2s ease-in-out infinite;
      transform-origin: bottom;
      /* GPU acceleration - force hardware acceleration */
      transform: translateZ(0);
      will-change: transform, opacity;
      animation-play-state: paused;
    }

    .audio-visualizer.playing span {
      animation-play-state: running;
    }

    .audio-visualizer.video-mode {
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    .audio-visualizer.video-mode:hover,
    .media-hover-control.video-mode.panel-open .audio-visualizer {
      transform: translateY(-1px) translateZ(0);
      background: rgba(0, 0, 0, 0.62);
      border-color: rgba(180, 220, 255, 0.35);
      box-shadow: none;
    }

    .audio-visualizer.video-mode span {
      background: rgba(180, 220, 255, 0.9);
      animation-name: audioPulseLite;
      animation-duration: 1.8s;
      animation-timing-function: steps(2, end);
    }

    .audio-visualizer span:nth-child(2) {
      animation-delay: -0.3s;
    }

    .audio-visualizer span:nth-child(3) {
      animation-delay: -0.6s;
    }

    .media-hover-panel {
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background:

<body>
  <div class="card-window">

            disablewebsecurity="false" enableremotemodule="false" enableblinkfeatures="LazyLoad,LazyImageLoading"

            preload="" disablewebsecurity="false" enableremotemodule="false"
            enableblinkfeatures="LazyLoad,LazyImageLoading" disableblinkfeatures="AutoplayIgnoresWebAudio"></webview>

  <script>
    // Get card ID and initial URL from query parameters
    const params = new URLSearchParams(window.location.search);
    let cardId = params.get('cardId');
    cardId = parseInt(cardId, 10);
    const encodedUrl = params.get('url');
    const theme = (params.get('theme') || 'primary').toLowerCase();
    let initialUrl = null;
    if (encodedUrl) {
      try {
        initialUrl = atob(encodedUrl);
      } catch (e) {
        initialUrl = decodeURIComponent(encodedUrl);
      }
    }

    // Apply theme
    const cardWindowEl = document.querySelector('.card-window');
    if (cardWindowEl) {
      const allThemeClasses = ['theme-alt', 'theme-sunset', 'theme-ocean', 'theme-emerald', 'theme-amber', 'theme-midnight', 'theme-cocoa'];
      allThemeClasses.forEach((cls) => cardWindowEl.classList.remove(cls));
      const normalizedTheme = theme === 'alt' ? 'sunset' : theme;
      if (normalizedTheme !== 'primary') {
        cardWindowEl.classList.add(`theme-${normalizedTheme}`);
      }
    }

    // Get DOM elements
    const closeBtn = document.getElementById('close-btn');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const wideBtn = document.getElementById('wide-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const minimizeBtn = document.getElementById('minimize-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    const splitBtn = document.getElementById('split-btn');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    const zoomInBtn = document.getElementById('zoom-in-btn');
    const zoomPercent = document.getElementById('zoom-percent');
    const urlInput = document.getElementById('url-input');
    const titleElement = document.querySelector('.title-text');
    const webview = document.getElementById('card-webview');
    const splitContainer = document.getElementById('split-container');
    const splitRightPane = document.getElementById('split-pane-right');
    const splitUrlInput = document.getElementById('split-url-input');
    const splitReloadBtn = document.getElementById('split-reload-btn');
    const splitGoBtn = document.getElementById('split-go-btn');
    const splitWebview = document.getElementById('split-webview');
    const titlebar = document.querySelector('.card-titlebar');
    const cardContent = document.querySelector('.card-content');
    const loadingWave = document.getElementById('loading-wave');
    const mediaHoverControl = document.getElementById('media-hover-control');
    const audioVisualizer = document.getElementById('audio-visualizer');
    const mediaToggleBtn = document.getElementById('media-toggle-btn');
    const mediaVolumeSlider = document.getElementById('media-volume-slider');
    const mediaMuteBtn = document.getElementById('media-mute-btn');
    const mediaRemainingTime = document.getElementById('media-remaining-time');
    let challengeBannerEl = null;
    let visualizerEnabled = true;
    let lastActiveMediaWebview = null;
    let mediaSyncTimer = null;
    let mediaVolumeDebounceTimer = null;
    let mediaRemainingTickTimer = null;
    let mediaRemainingSeconds = null;
    let mediaRemainingHasDuration = false;
    let mediaRemainingIsLive = false;
    let mediaRemainingIsPlaying = false;
    let mediaPanelOpen = false;
    const mediaPlayingState = new Map();
    let securityLoadNoticeEl = null;
    let networkRecoveryWatcher = null;
    window._networkErrorActive = false;
    let isMinimizingCard = false;
    function waitForCardAnimationEnd(el, expectedName, fallbackMs) {
      return new Promise((resolve) => {
        if (!el) {
          resolve();
          return;
        }
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          el.removeEventListener('animationend', onEnd);
          resolve();
        };
        const onEnd = (evt) => {
          if (!evt || evt.target !== el) return;
          if (expectedName && evt.animationName !== expectedName) return;
          finish();
        };
        el.addEventListener('animationend', onEnd, { once: false });
        setTimeout(finish, fallbackMs);
      });
    }
    const cardDownloadRingBtn = document.getElementById('card-download-ring');
    const cardDownloadRingFg = cardDownloadRingBtn ? cardDownloadRingBtn.querySelector('.download-ring__fg') : null;

    // Track current page info for bookmarking
    let currentPageTitle = 'New Tab';
    let currentPageUrl = initialUrl || '';

    // Track current size state
    let isWideView = false;
    let isFullscreen = false;
    let originalBounds = null;
    let isSplitView = false;
    let currentSplitUrl = '';
    let zoomFactor = 1.0;
    const ZOOM_MIN = 0.5;
    const ZOOM_MAX = 3.0;
    const ZOOM_STEP = 0.1;
    let zoomHideTimer = null;

    const isCloudflareChallengeUrl = (rawUrl) => {
      try {
        const parsed = new URL(String(rawUrl || ''));
        const host = parsed.hostname.toLowerCase();
        if (host === 'challenges.cloudflare.com') return true;
        if (parsed.pathname.includes('/cdn-cgi/challenge-platform/')) return true;
      } catch (e) { }
      return false;
    };

    let lastNonChallengeUrl = '';

    // Track downloads for this card window
    const cardDownloads = new Map(); // id -> {receivedBytes,totalBytes,percent,state,filename,savePath,...}
    let ringDismissed = false; // User can dismiss the ring after interacting
    let loadingWaveVisible = false;

    function setLoadingWave(isActive) {
      if (!loadingWave) return;
      if (isActive) {
        loadingWave.classList.add('active');
        loadingWaveVisible = true;
      } else {
        loadingWave.classList.remove('active');
        loadingWaveVisible = false;
      }
    }

    function ensureSecurityLoadNotice() {
      if (securityLoadNoticeEl) return securityLoadNoticeEl;
      if (!cardContent) return null;
      const el = document.createElement('div');
      el.className = 'security-load-notice';
      el.id = 'security-load-notice';
      el.setAttribute('role', 'alert');
      cardContent.appendChild(el);
      securityLoadNoticeEl = el;
      return el;
    }

    function showChallengeBanner(targetUrl) {
      if (!cardContent) return;
      if (!challengeBannerEl) {
        const banner = document.createElement('div');
        banner.className = 'security-load-notice active';
        banner.style.top = '12px';
        banner.style.background = 'linear-gradient(135deg, rgba(12, 24, 40, 0.95), rgba(22, 36, 56, 0.95))';
        banner.style.borderColor = 'rgba(120, 200, 255, 0.45)';
        banner.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="font-weight:600; color: rgba(235, 245, 255, 0.95);">Security challenge detected</div>
            <div style="flex:1;"></div>
            <button id="challenge-open-external" style="padding:6px 10px; font-size:11px; border-radius:6px; border:1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: white; cursor: pointer;">Open In Browser</button>
            <button id="challenge-dismiss" style="padding:6px 8px; font-size:11px; border-radius:6px; border:1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; cursor: pointer;">Dismiss</button>
          </div>
          <div style="margin-top:6px; font-size:11px; color: rgba(200, 220, 240, 0.85);">
            Some security checks require Chrome, Edge, or Firefox to complete.
          </div>
        `;
        cardContent.appendChild(banner);
        challengeBannerEl = banner;
      }

      const openBtn = challengeBannerEl.querySelector('#challenge-open-external');
      const dismissBtn = challengeBannerEl.querySelector('#challenge-dismiss');
      if (openBtn) {
        openBtn.onclick = () => {
          if (window.cardAPI && window.cardAPI.sendToMain) {
            window.cardAPI.sendToMain('open-external-challenge', { url: targetUrl });
          }
        };
      }
      if (dismissBtn) {
        dismissBtn.onclick = () => {
          if (challengeBannerEl) challengeBannerEl.remove();
          challengeBannerEl = null;
        };
      }
    }

    function hideSecurityLoadNotice() {
      const el = ensureSecurityLoadNotice();
      if (!el) return;
      el.classList.remove('active');
      el.textContent = '';
      // Reset network error flag when manually hiding
      window._networkErrorActive = false;
      stopNetworkRecoveryWatcher();
    }

    function setNetworkErrorActive(active) {
      window._networkErrorActive = active;
      if (!active) {
        stopNetworkRecoveryWatcher();
      }
    }

    function stopNetworkRecoveryWatcher() {
      if (!networkRecoveryWatcher) return;
      clearInterval(networkRecoveryWatcher);
      networkRecoveryWatcher = null;
    }

    function isNetworkNoticeMessage(message) {
      const text = String(message || '').toLowerCase();
      return text.includes('internet') || text.includes('connection') || text.includes('network');
    }

    async function probeInternetConnection(timeoutMs = 3500) {
      // Browser-level offline state is a fast first-pass check.
      if (navigator && navigator.onLine === false) return false;
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => {
          try { controller.abort(); } catch (e) { }
        }, timeoutMs);
        await fetch(`https://www.gstatic.com/generate_204?t=${Date.now()}`, {
          method: 'GET',
          mode: 'no-cors',
          cache: 'no-store',
          signal: controller.signal,
        });
        clearTimeout(timer);
        return true;
      } catch (e) {
        return false;
      }
    }

    async function recoverNetworkNoticeIfOnline() {
      if (!window._networkErrorActive) return false;
      const onlineNow = await probeInternetConnection();
      if (!onlineNow) return false;
      setNetworkErrorActive(false);
      hideSecurityLoadNotice();
      return true;
    }

    function startNetworkRecoveryWatcher() {
      if (networkRecoveryWatcher) return;
      networkRecoveryWatcher = setInterval(() => {
        recoverNetworkNoticeIfOnline();
      }, 4000);
    }

    function isHttpUrl(rawUrl) {
      const value = String(rawUrl || '').trim().toLowerCase();
      return value.startsWith('http://') || value.startsWith('https://');
    }

    function hideSecurityNoticeWhenAppropriate(force = false) {
      if (force) {
        setNetworkErrorActive(false);
        hideSecurityLoadNotice();
        return;
      }
      if (window._networkErrorActive) {
        recoverNetworkNoticeIfOnline();
        return;
      }
      hideSecurityLoadNotice();
    }

    function showSecurityLoadNotice(message) {
      const el = ensureSecurityLoadNotice();
      if (!el) return;
      el.textContent = message;
      el.classList.add('active');
      // Keep network notices visible until a real connectivity probe confirms recovery.
      if (isNetworkNoticeMessage(message)) {
        setNetworkErrorActive(true);
        startNetworkRecoveryWatcher();
        recoverNetworkNoticeIfOnline();
      } else {
        setNetworkErrorActive(false);
      }
    }

    function isTlsOrCertificateFailure(errorCode, errorDescription) {
      const code = Number(errorCode);
      const desc = String(errorDescription || '').toUpperCase();
      if (desc.includes('CERT') || desc.includes('SSL') || desc.includes('TLS')) return true;
      const certCodes = new Set([-200, -201, -202, -203, -204, -205, -206, -207, -208, -210, -213, -501]);
      return certCodes.has(code);
    }

    // Detect network/connection errors (no internet, DNS failure, timeout, etc.)
    function isNetworkError(errorCode, errorDescription) {
      const code = Number(errorCode);
      const desc = String(errorDescription || '').toUpperCase();
      // Check error description for network-related keywords
      if (desc.includes('INTERNET') || desc.includes('NETWORK') ||
        desc.includes('CONNECTION') || desc.includes('TIMED OUT') ||
        desc.includes('DNS') || desc.includes('ADDRESS') || desc.includes('REACHABLE') ||
        desc.includes('RESET') || desc.includes('DISCONNECTED')) {
        return true;
      }
      // Common Chromium error codes for network failures
      const networkCodes = new Set([
        -2,   // ERR_NAME_NOT_RESOLVED
        -3,   // ERR_ADDRESS_UNREACHABLE  
        -6,   // ERR_CONNECTION_FAILED
        -7,   // ERR_CONNECTION_TIMED_OUT
        -17,  // ERR_INTERNET_DISCONNECTED
        -101, // ERR_CONNECTION_RESET
        -105, // ERR_NAME_NOT_RESOLVED
        -118, // ERR_CONNECTION_TIMED_OUT
        -200  // ERR_NETWORK_ACCESS_DENIED
      ]);
      return networkCodes.has(code);
    }

    function getMediaTargets() {
      const targets = [];
      if (webview) targets.push(webview);
      if (isSplitView && splitWebview) targets.push(splitWebview);
      return targets;
    }

    async function runMediaScript(targetWebview, script) {
      if (!targetWebview || typeof targetWebview.executeJavaScript !== 'function') return null;
      try {
        return await targetWebview.executeJavaScript(script, true);
      } catch (e) {
        return null;
      }
    }

    // Cache media state per-webview so split panes do not share stale state.
    const mediaStateCache = new WeakMap();
    const MEDIA_STATE_CACHE_TTL = 500; // Cache for 500ms

    function clearMediaStateCache(targetWebview) {
      if (!targetWebview) return;
      try {
        mediaStateCache.delete(targetWebview);
      } catch (e) { }
    }

    async function readMediaState(targetWebview) {
      // Return cached state if still valid (reduces DOM queries during playback)
      const now = Date.now();
      const cached = mediaStateCache.get(targetWebview);
      if (cached && (now - cached.timestamp) < MEDIA_STATE_CACHE_TTL) {
        return cached.state;
      }

      const script = `
        (() => {
          const media = Array.from(document.querySelectorAll('video, audio'));
          if (!media.length) return { hasMedia: false, isPlaying: false, isVideo: false, volume: 1, muted: false, hasDuration: false, remainingSeconds: null, isLive: false };
          const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
          if (!active) return { hasMedia: false, isPlaying: false, isVideo: false, volume: 1, muted: false, hasDuration: false, remainingSeconds: null, isLive: false };
          const rawVolume = Number(active.volume);
          const volume = Number.isFinite(rawVolume) ? Math.max(0, Math.min(1, rawVolume)) : 1;
          const duration = Number(active.duration);
          const currentTime = Number(active.currentTime);
          const hasDuration = Number.isFinite(duration) && duration > 0;
          const remainingSeconds = (hasDuration && Number.isFinite(currentTime))
            ? Math.max(0, duration - Math.max(0, currentTime))
            : null;
          const isLive = !hasDuration && (duration === Infinity || !Number.isFinite(duration));
          return {
            hasMedia: true,
            isPlaying: !!(!active.paused && !active.ended),
            isVideo: String(active.tagName || '').toLowerCase() === 'video',
            volume,
            muted: !!active.muted,
            hasDuration,
            remainingSeconds,
            isLive
          };
        })();
      `;
      const result = await runMediaScript(targetWebview, script);
      if (result) {
        mediaStateCache.set(targetWebview, {
          state: result,
          timestamp: now
        });
      }
      return result;
    }

    function renderMediaControl(state) {
      if (!mediaHoverControl || !audioVisualizer) return;

      const isPlaying = !!(state && state.isPlaying);
      const isVideo = !!(state && state.isVideo);
      const muted = (state && typeof state.muted === 'boolean') ? state.muted : null;
      const hasVolume = !!(state && Number.isFinite(state.volume));
      const sliderValue = hasVolume ? Math.round((state.volume * 100)) : null;
      const shouldShow = visualizerEnabled && isPlaying;
      const hasDuration = !!(state && state.hasDuration);
      const isLive = !!(state && state.isLive);
      const remainingSeconds = (state && Number.isFinite(state.remainingSeconds))
        ? Math.max(0, state.remainingSeconds)
        : null;

      mediaHoverControl.classList.toggle('active', shouldShow);
      mediaHoverControl.classList.toggle('video-mode', shouldShow && isVideo);
      mediaHoverControl.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
      audioVisualizer.classList.toggle('playing', shouldShow && isPlaying);
      audioVisualizer.classList.toggle('video-mode', shouldShow && isVideo);
      if (!shouldShow) {
        setMediaPanelOpen(false);
      }

      if (mediaToggleBtn) {
        mediaToggleBtn.textContent = isPlaying ? 'Pause' : 'Play';
        mediaToggleBtn.disabled = !shouldShow;
      }
      if (mediaMuteBtn) {
        if (typeof muted === 'boolean') {
          mediaMuteBtn.textContent = muted ? 'Unmute' : 'Mute';
        }
        mediaMuteBtn.disabled = !shouldShow;
      }
      if (mediaVolumeSlider) {
        if (hasVolume && sliderValue !== null) {
          mediaVolumeSlider.value = String(Math.max(0, Math.min(100, sliderValue)));
        }
        mediaVolumeSlider.disabled = !shouldShow;
      }

      mediaRemainingHasDuration = shouldShow && hasDuration;
      mediaRemainingIsLive = shouldShow && isLive;
      mediaRemainingIsPlaying = shouldShow && isPlaying;
      mediaRemainingSeconds = mediaRemainingHasDuration ? remainingSeconds : null;
      updateMediaRemainingDisplay();
      if (mediaRemainingHasDuration && mediaRemainingIsPlaying) {
        startMediaRemainingTicker();
      } else {
        stopMediaRemainingTicker();
      }
    }

    function formatMediaRemaining(totalSeconds) {
      const safe = Math.max(0, Math.floor(Number(totalSeconds) || 0));
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;
      if (hours > 0) {
        return `${String(hours)}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateMediaRemainingDisplay() {
      if (!mediaRemainingTime) return;
      if (mediaRemainingIsLive) {
        mediaRemainingTime.textContent = 'LIVE';
        return;
      }
      if (mediaRemainingHasDuration && Number.isFinite(mediaRemainingSeconds)) {
        mediaRemainingTime.textContent = `-${formatMediaRemaining(mediaRemainingSeconds)}`;
        return;
      }
      mediaRemainingTime.textContent = '--:--';
    }

    function startMediaRemainingTicker() {
      if (mediaRemainingTickTimer) return;
      mediaRemainingTickTimer = setInterval(() => {
        if (!mediaRemainingHasDuration || !mediaRemainingIsPlaying || !Number.isFinite(mediaRemainingSeconds)) return;
        mediaRemainingSeconds = Math.max(0, mediaRemainingSeconds - 1);
        updateMediaRemainingDisplay();
      }, 1000);
    }

    function stopMediaRemainingTicker() {
      if (!mediaRemainingTickTimer) return;
      clearInterval(mediaRemainingTickTimer);
      mediaRemainingTickTimer = null;
    }

    function setMediaPanelOpen(isOpen) {
      if (!mediaHoverControl) return;
      const canOpen = mediaHoverControl.classList.contains('active');
      mediaPanelOpen = !!isOpen && canOpen;
      mediaHoverControl.classList.toggle('panel-open', mediaPanelOpen);
      if (mediaPanelOpen) {
        syncMediaControlState();
        startMediaSyncLoop();
      } else {
        stopMediaSyncLoop();
      }
    }

    async function getBestMediaTarget() {
      const targets = getMediaTargets();
      if (lastActiveMediaWebview && targets.includes(lastActiveMediaWebview)) {
        const state = await readMediaState(lastActiveMediaWebview);
        if (state && state.hasMedia) {
          return { target: lastActiveMediaWebview, state };
        }
      }

      let fallback = null;
      for (const target of targets) {
        const state = await readMediaState(target);
        if (!state || !state.hasMedia) continue;
        if (state.isPlaying) {
          lastActiveMediaWebview = target;
          return { target, state };
        }
        if (!fallback) fallback = { target, state };
      }
      if (fallback) {
        lastActiveMediaWebview = fallback.target;
        return fallback;
      }
      return { target: null, state: { hasMedia: false, isPlaying: false, isVideo: false, volume: 1, muted: false } };
    }

    async function syncMediaControlState() {
      const result = await getBestMediaTarget();
      renderMediaControl(result.state);
      if (!result || !result.state || !result.state.isPlaying) {
        stopMediaSyncLoop();
      }
    }

    function setAudioVisualizer(isActive) {
      if (!visualizerEnabled) {
        renderMediaControl({ hasMedia: false, isPlaying: false, isVideo: false, volume: 1, muted: false });
        stopMediaRemainingTicker();
        return;
      }
      if (isActive) {
        updateVisualizerPlaybackState();
        if (mediaPanelOpen) {
          syncMediaControlState();
        }
      } else {
        renderMediaControl({ hasMedia: false, isPlaying: false, isVideo: false, volume: 1, muted: false });
        stopMediaRemainingTicker();
      }
    }

    function startMediaSyncLoop() {
      if (mediaSyncTimer || !mediaPanelOpen) return;
      mediaSyncTimer = setInterval(() => {
        syncMediaControlState();
      }, 2000); // Reduced frequency: 2000ms instead of 1200ms to reduce CPU overhead
    }

    function stopMediaSyncLoop() {
      if (!mediaSyncTimer) return;
      clearInterval(mediaSyncTimer);
      mediaSyncTimer = null;
    }

    function isAnyMediaPlaying() {
      for (const value of mediaPlayingState.values()) {
        if (value && value.isPlaying) return true;
      }
      return false;
    }

    function isAnyVideoPlaying() {
      for (const value of mediaPlayingState.values()) {
        if (value && value.isPlaying && value.mediaType === 'video') return true;
      }
      return false;
    }

    async function detectPlayingMediaType(targetWebview) {
      const script = `
        (() => {
          const media = Array.from(document.querySelectorAll('video, audio'));
          const active = media.find((m) => !m.paused && !m.ended);
          if (!active) return 'none';
          return String(active.tagName || '').toLowerCase() === 'video' ? 'video' : 'audio';
        })();
      `;
      const result = await runMediaScript(targetWebview, script);
      return result === 'video' ? 'video' : (result === 'audio' ? 'audio' : 'unknown');
    }

    async function refreshMediaPlayingType(targetWebview) {
      if (!targetWebview) return;
      const state = mediaPlayingState.get(targetWebview);
      if (!state || !state.isPlaying) return;
      const mediaType = await detectPlayingMediaType(targetWebview);
      const nextState = { isPlaying: true, mediaType };
      mediaPlayingState.set(targetWebview, nextState);
      updateVisualizerPlaybackState();
      clearMediaStateCache(targetWebview);
    }

    function updateVisualizerPlaybackState() {
      const isPlaying = isAnyMediaPlaying();
      const isVideo = isAnyVideoPlaying();
      renderMediaControl({ isPlaying, isVideo });
    }

    async function controlMedia(action, value) {
      const result = await getBestMediaTarget();
      if (!result || !result.target) return;

      const safeVolume = Number.isFinite(value) ? Math.max(0, Math.min(1, value)) : 1;
      let script = '';
      if (action === 'toggle') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            if (!active.paused && !active.ended) {
              active.pause();
            } else {
              const p = active.play();
              if (p && typeof p.catch === 'function') p.catch(() => {});
            }
            return true;
          })();
        `;
      } else if (action === 'volume') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            active.volume = ${safeVolume};
            if (active.volume > 0 && active.muted) active.muted = false;
            return true;
          })();
        `;
      } else if (action === 'mute') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            active.muted = !active.muted;
            return true;
          })();
        `;
      }

      if (!script) return;
      await runMediaScript(result.target, script);
      setTimeout(() => {
        syncMediaControlState();
      }, 80);
    }

    if (audioVisualizer) {
      audioVisualizer.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (!mediaHoverControl || !mediaHoverControl.classList.contains('active')) return;
        const nextOpen = !mediaPanelOpen;
        setMediaPanelOpen(nextOpen);
        if (nextOpen) {
          syncMediaControlState();
        }
      });
    }

    document.addEventListener('pointerdown', (event) => {
      if (!mediaPanelOpen || !mediaHoverControl) return;
      if (mediaHoverControl.contains(event.target)) return;
      setMediaPanelOpen(false);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && mediaPanelOpen) {
        setMediaPanelOpen(false);
      }
    });

    if (mediaToggleBtn) {
      mediaToggleBtn.addEventListener('click', () => {
        controlMedia('toggle');
      });
    }

    if (mediaVolumeSlider) {
      mediaVolumeSlider.addEventListener('input', () => {
        const value = Number(mediaVolumeSlider.value);
        if (mediaVolumeDebounceTimer) {
          clearTimeout(mediaVolumeDebounceTimer);
        }
        mediaVolumeDebounceTimer = setTimeout(() => {
          controlMedia('volume', value / 100);
          mediaVolumeDebounceTimer = null;
        }, 90);
      });
    }

    if (mediaMuteBtn) {
      mediaMuteBtn.addEventListener('click', () => {
        controlMedia('mute');
      });
    }

    function updateCardDownloadRing() {
      if (!cardDownloadRingBtn) return;

      // Hide if dismissed or no downloads at all
      if (ringDismissed || cardDownloads.size === 0) {
        cardDownloadRingBtn.style.display = 'none';
        cardDownloadRingBtn.setAttribute('aria-hidden', 'true');
        cardDownloadRingBtn.classList.remove('indeterminate');
        cardDownloadRingBtn.classList.remove('completed');
        return;
      }

      cardDownloadRingBtn.style.display = 'inline-flex';
      cardDownloadRingBtn.setAttribute('aria-hidden', 'false');

      const active = Array.from(cardDownloads.values()).filter(d => d && d.state !== 'completed');
      const completed = Array.from(cardDownloads.values()).filter(d => d && d.state === 'completed');

      // If all downloads are completed, show checkmark style
      if (active.length === 0 && completed.length > 0) {
        cardDownloadRingBtn.classList.remove('indeterminate');
        cardDownloadRingBtn.classList.add('completed');
        if (cardDownloadRingFg) {
          cardDownloadRingFg.style.strokeDashoffset = '0'; // Full ring
        }
        const iconEl = cardDownloadRingBtn.querySelector('.download-ring__icon');
        if (iconEl) {
          iconEl.textContent = '✓';
        }
        cardDownloadRingBtn.title = `${completed.length} download${completed.length > 1 ? 's' : ''} completed - Click to open`;
        return;
      }

      // Reset icon to download arrow for active downloads
      const iconEl = cardDownloadRingBtn.querySelector('.download-ring__icon');
      if (iconEl) {
        iconEl.textContent = '⬇';
      }

      // Show progress for active downloads
      cardDownloadRingBtn.classList.remove('completed');
      let receivedSum = 0;
      let totalSum = 0;
      let hasTotal = true;
      active.forEach(d => {
        receivedSum += d.receivedBytes || 0;
        if (d.totalBytes && d.totalBytes > 0) {
          totalSum += d.totalBytes;
        } else {
          hasTotal = false;
        }
      });

      if (!hasTotal || totalSum <= 0) {
        cardDownloadRingBtn.classList.add('indeterminate');
        cardDownloadRingBtn.title = 'Downloading...';
        return;
      }

      cardDownloadRingBtn.classList.remove('indeterminate');
      const progress = Math.max(0, Math.min(1, receivedSum / totalSum));
      const circumference = 97.4;
      const offset = circumference * (1 - progress);
      if (cardDownloadRingFg) {
        cardDownloadRingFg.style.strokeDashoffset = String(offset);
      }
      cardDownloadRingBtn.title = `Downloading... ${Math.round(progress * 100)}%`;
    }

    function showDownloadToast(filename) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position: fixed; bottom: 18px; right: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 14px; border-radius: 14px; font-size: 11px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.45); max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;';
      toast.textContent = `Download finished: ${filename || 'file'}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function showDownloadModal() {
      const completed = Array.from(cardDownloads.values()).filter(d => d && d.state === 'completed');
      if (completed.length === 0) return;

      // Remove existing modal if any
      const existing = document.getElementById('card-download-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'card-download-modal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center;';

      const content = document.createElement('div');
      content.style.cssText = 'background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; width: 320px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5);';

      content.innerHTML = `
        <h3 style="color: white; margin: 0 0 12px 0; font-size: 14px; font-weight: 600;">Completed Downloads</h3>
        <div id="card-download-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button id="card-download-dismiss" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; cursor: pointer;">Dismiss</button>
        </div>
      `;

      const list = content.querySelector('#card-download-list');
      completed.forEach(d => {
        const item = document.createElement('div');
        item.style.cssText = 'display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px;';
        const safeName = (d.filename || 'download').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        item.innerHTML = `
          <div style="flex: 1; min-width: 0;">
            <div style="color: white; font-weight: 600; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${safeName}</div>
            <div style="color: rgba(255,255,255,0.7); font-size: 9px; margin-top: 2px;">Click to open file</div>
          </div>
          <button class="card-download-open-btn" data-path="${d.savePath ? encodeURIComponent(d.savePath) : ''}" style="padding: 6px 10px; font-size: 10px; background: rgba(255,255,255,0.2); border: none; border-radius: 6px; color: white; cursor: pointer; white-space: nowrap;">Open</button>
        `;

        const openBtn = item.querySelector('.card-download-open-btn');
        if (openBtn && d.savePath) {
          openBtn.addEventListener('click', async () => {
            try {
              if (window.cardAPI && window.cardAPI.showItemInFolder) {
                await window.cardAPI.showItemInFolder(d.savePath);
              }
            } catch (err) {
              console.error('Failed to open file:', err);
            }
          });
        }

        item.addEventListener('click', async (e) => {
          if (e.target.closest('button')) return;
          if (d.savePath && window.cardAPI && window.cardAPI.showItemInFolder) {
            try {
              await window.cardAPI.showItemInFolder(d.savePath);
            } catch (err) {
              console.error('Failed to open file:', err);
            }
          }
        });

        list.appendChild(item);
      });

      modal.appendChild(content);
      document.body.appendChild(modal);

      // Dismiss button
      content.querySelector('#card-download-dismiss').addEventListener('click', () => {
        modal.remove();
        ringDismissed = true;
        updateCardDownloadRing();
      });

      // Close on backdrop click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.remove();
        }
      });
    }

    if (cardDownloadRingBtn) {
      cardDownloadRingBtn.addEventListener('click', () => {
        const completed = Array.from(cardDownloads.values()).filter(d => d && d.state === 'completed');
        if (completed.length > 0) {
          showDownloadModal();
        }
      });
    }

    // Ensure webview preload is set (injects notification + popup handling)
    try {
      const preloadUrl = new URL('../preload-webview.js', window.location.href).toString();
      webview.setAttribute('preload', preloadUrl);
      if (splitWebview) {
        splitWebview.setAttribute('preload', preloadUrl);
      }
    } catch (e) { }

    // Force a Chrome-like UA for challenge compatibility (Cloudflare/Turnstile).
    try {
      if (window.cardAPI && window.cardAPI.getUserAgent) {
        window.cardAPI.getUserAgent().then((ua) => {
          if (ua) {
            try { webview.setUserAgent(ua); } catch (e) { }
            if (splitWebview) {
              try { splitWebview.setUserAgent(ua); } catch (e) { }
            }
          }
          if (pendingInitialUrl) {
            applyInitialUrl(pendingInitialUrl);
            pendingInitialUrl = null;
          }
        }).catch(() => { });
      }
    } catch (e) { }

    // Defer initial navigation until UA is applied to avoid challenge scripts
    // seeing the default Electron UA.
    let pendingInitialUrl = initialUrl;
    if (pendingInitialUrl) {
      initialUrl = null;
    }
    const applyInitialUrl = (target) => {
      if (!target || !webview) return;
      try {
        webview.src = target;
        urlInput.value = target;
        currentPageUrl = target;
      } catch (e) { }
    };

    // Load initial URL if provided
    if (initialUrl) {
      pendingInitialUrl = initialUrl;
    }

    // Update URL and title when webview navigates
    webview.addEventListener('did-navigate', (e) => {
      try {
        if (isHttpUrl(e && e.url)) {
          hideSecurityNoticeWhenAppropriate(true);
        } else {
          hideSecurityNoticeWhenAppropriate();
        }
        urlInput.value = e.url;
        currentPageUrl = e.url;
        checkBookmarkStatus();
        if (!isCloudflareChallengeUrl(e.url)) {
          lastNonChallengeUrl = e.url;
        } else if (window.cardAPI && window.cardAPI.sendToMain) {
          window.cardAPI.sendToMain('cloudflare-challenge', {
            cardId,
            challengeUrl: e.url,
            targetUrl: lastNonChallengeUrl || ''
          });
        }
      } catch (err) { }
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      try {
        if (isHttpUrl(e && e.url)) {
          hideSecurityNoticeWhenAppropriate(true);
        } else {
          hideSecurityNoticeWhenAppropriate();
        }
        urlInput.value = e.url;
        currentPageUrl = e.url;
        checkBookmarkStatus();
        if (!isCloudflareChallengeUrl(e.url)) {
          lastNonChallengeUrl = e.url;
        } else if (window.cardAPI && window.cardAPI.sendToMain) {
          window.cardAPI.sendToMain('cloudflare-challenge', {
            cardId,
            challengeUrl: e.url,
            targetUrl: lastNonChallengeUrl || ''
          });
        }
      } catch (err) { }
    });

    if (splitWebview) {
      splitWebview.addEventListener('did-navigate', (e) => {
        if (isHttpUrl(e && e.url)) {
          hideSecurityNoticeWhenAppropriate(true);
        } else {
          hideSecurityNoticeWhenAppropriate();
        }
        currentSplitUrl = e.url || '';
        if (splitUrlInput) splitUrlInput.value = currentSplitUrl;
      });
      splitWebview.addEventListener('did-navigate-in-page', (e) => {
        if (isHttpUrl(e && e.url)) {
          hideSecurityNoticeWhenAppropriate(true);
        } else {
          hideSecurityNoticeWhenAppropriate();
        }
        currentSplitUrl = e.url || '';
        if (splitUrlInput) splitUrlInput.value = currentSplitUrl;
      });
      splitWebview.addEventListener('did-start-navigation', (e) => {
        if (e && e.isMainFrame) {
          resetZoom(splitWebview);
        }
      });
      splitWebview.addEventListener('dom-ready', () => {
        resetZoom(splitWebview);
      });
    }

    function loadSplitUrl(targetUrl) {
      if (!splitWebview || !targetUrl) return;
      try {
        splitWebview.setAttribute('src', targetUrl);
        splitWebview.src = targetUrl;
      } catch (e) {
        try {
          splitWebview.loadURL(targetUrl);
        } catch (err) { }
      }
      currentSplitUrl = targetUrl;
    }

    function clampZoom(value) {
      return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, value));
    }

    function applyZoom(targetFactor) {
      zoomFactor = clampZoom(targetFactor);
      try {
        webview.setZoomFactor(zoomFactor);
      } catch (e) { }
      try {
        if (splitWebview) splitWebview.setZoomFactor(zoomFactor);
      } catch (e) { }
      if (zoomPercent) {
        zoomPercent.textContent = `${Math.round(zoomFactor * 100)}%`;
      }
    }

    function showZoomPercent() {
      if (!zoomPercent) return;
      zoomPercent.style.display = 'inline-block';
      if (zoomHideTimer) clearTimeout(zoomHideTimer);
      zoomHideTimer = setTimeout(() => {
        zoomPercent.style.display = 'none';
      }, 1200);
    }

    function resetZoom(wv) {
      if (!wv) return;
      try {
        wv.setZoomLevel(0);
      } catch (e) { }
      try {
        wv.setZoomFactor(1.0);
      } catch (e) { }
      zoomFactor = 1.0;
    }


    webview.addEventListener('page-title-updated', (e) => {
      try {
        titleElement.textContent = e.title;
        currentPageTitle = e.title;
        checkBookmarkStatus();
        if (window.cardAPI && window.cardAPI.sendToMain) {

    // Loading wave for render progress
    webview.addEventListener('did-start-navigation', (e) => {
      if (e && e.isMainFrame) {
        hideSecurityNoticeWhenAppropriate();
        resetZoom(webview);
        setLoadingWave(true);
        clearMediaStateCache(webview);
        mediaPlayingState.set(webview, { isPlaying: false, mediaType: 'unknown' });
        updateVisualizerPlaybackState();
      }
    });

    // Hide shortly after first paint/DOM is ready instead of waiting for full load
    webview.addEventListener('dom-ready', () => {
      hideSecurityNoticeWhenAppropriate();
      resetZoom(webview);
      if (loadingWaveVisible) {
        setTimeout(() => setLoadingWave(false), 220);
      }
    });

    webview.addEventListener('did-stop-loading', () => {
      hideSecurityNoticeWhenAppropriate();
      if (loadingWaveVisible) {
        setLoadingWave(false);
      }
    });

    webview.addEventListener('did-fail-load', (e) => {
      if (loadingWaveVisible) {
        setLoadingWave(false);
      }
      if (e && e.isMainFrame) {
        if (isTlsOrCertificateFailure(e.errorCode, e.errorDescription)) {
          showSecurityLoadNotice('Secure connection blocked: this site presented an invalid TLS certificate. Check your device date/time, network, or try again later.');
        } else if (isNetworkError(e.errorCode, e.errorDescription)) {
          showSecurityLoadNotice('No internet connection. Please check your network settings and try again.');
        }
      }
    });

    // Handle webview crash/termination (could indicate network issues)
    webview.addEventListener('crashed', (e) => {
      console.log('[Card] Webview crashed, checking network status');
      showSecurityLoadNotice('Connection lost. Please check your internet connection and try again.');
    });

    // Handle render process gone (could indicate network issues)
    webview.addEventListener('render-process-gone', (e) => {
      console.log('[Card] Render process gone:', e.reason);
      if (e.reason === 'crashed' || e.reason === 'abnormal') {
        showSecurityLoadNotice('Connection lost. Please check your internet connection and try again.');
      }
    });

    // Handle load-stop - fires after any load attempt completes
    let loadStartTime = 0;
    let loadTimeout = null;
    webview.addEventListener('did-start-loading', () => {
      loadStartTime = Date.now();
      if (loadTimeout) clearTimeout(loadTimeout);
      loadTimeout = setTimeout(() => {
        const currentUrl = webview.getURL ? webview.getURL() : '';
        if (currentUrl === 'about:blank' || !currentUrl || currentUrl.startsWith('chrome://')) {
          showSecurityLoadNotice('Connection timed out. Please check your internet connection and try again.');
          if (loadingWaveVisible) setLoadingWave(false);
        }
      }, 15000);
    });

    webview.addEventListener('did-finish-load', () => {
      if (loadingWaveVisible) {
        setLoadingWave(false);
      }
    });

    webview.addEventListener('load-stop', () => {
      hideSecurityNoticeWhenAppropriate();

        if (e.channel === 'user-gesture') {

    const NORMAL_WIDTH = 900;

    wideBtn.addEventListener('click', async () => {
      try {
        if (!isWideView) {
          // Save current bounds before going wide
          const pos = window.cardAPI.getWindowPosition();
          // Save current bounds before going wide (use current window size,
          // but fall back to the configured normal size if unavailable)
          originalBounds = {
            x: pos.x,
            y: pos.y,
            width: window.outerWidth || NORMAL_WIDTH,
            height: window.outerHeight || NORMAL_HEIGHT,
          };

          // Calculate centered position for wider window
          const screenWidth = window.screen.availWidth;
          const newX = Math.floor((screenWidth - WIDE_WIDTH) / 2);

          await window.cardAPI.resizeCard(cardId, newX, pos.y, WIDE_WIDTH, WIDE_HEIGHT);
          isWideView = true;
          wideBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          wideBtn.title = `Normal View (${NORMAL_WIDTH}px)`;
        } else {
          // Restore original size
          if (originalBounds) {
            await window.cardAPI.resizeCard(
              cardId,
              originalBounds.x,
              originalBounds.y,
              originalBounds.width,
              originalBounds.height
            );
          }
          isWideView = false;
          wideBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          wideBtn.title = `Wide View (${WIDE_WIDTH}px)`;

            originalBounds = {
              x: pos.x,
              y: pos.y,
              width: window.outerWidth || NORMAL_WIDTH,
              height: window.outerHeight || NORMAL_HEIGHT,
            };

          await window.cardAPI.toggleFullscreen(cardId, true);
          isFullscreen = true;
          fullscreenBtn.style.background = 'rgba(100, 255, 100, 0.8)'; // Green when active
          fullscreenBtn.textContent = '⛶';
          fullscreenBtn.title = 'Exit Fullscreen';

                originalBounds.y,
                originalBounds.width,

              );

          fullscreenBtn.style.background = 'rgba(100, 200, 255, 0.7)';
          fullscreenBtn.title = 'Toggle Fullscreen';

    if (splitBtn) {

        splitBtn.style.background = isSplitView ? 'rgba(100, 255, 100, 0.8)' : 'rgba(255,255,255,0.08)';

          cardWindowEl.classList.add('is-minimizing');

          return urlInput && urlInput.value ? urlInput.value : '';

    // --- Bookmark confirmation modal (rendered on the card) ---
    function showBookmarkModal(folders) {
      // Build modal HTML
      let folderPickerHTML = '';
      if (folders.length >= 2) {
        folderPickerHTML = `
          <label style="color: rgba(255,255,255,0.7); font-size: 11px; display: block; margin-bottom: 6px;">Save to folder:</label>
          <div id="bm-folder-options" style="display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; margin-bottom: 12px;"></div>
        `;
      }

      const modal = document.createElement('div');
      modal.id = 'bm-modal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center;';
      modal.innerHTML = `
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
          <h3 style="color: white; margin: 0 0 6px 0; font-size: 14px;">Add Bookmark</h3>
          <p style="color: rgba(255,255,255,0.7); font-size: 11px; margin: 0 0 14px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${currentPageTitle || currentPageUrl}</p>
          ${folderPickerHTML}
          <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button id="bm-cancel" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; cursor: pointer;">Cancel</button>
            <button id="bm-ok" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; cursor: pointer;">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      // Build folder options if 2+ folders
      let selectedFolderId = folders.length > 0 ? folders[0].id : null;

      if (folders.length >= 2) {
        const optionsContainer = modal.querySelector('#bm-folder-options');
        folders.forEach((folder, index) => {
          const option = document.createElement('div');
          option.style.cssText = 'display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); transition: all 0.15s ease;';
          option.innerHTML = `<span style="font-size: 13px;">📁</span><span style="color: white; font-size: 11px; flex: 1;">${folder.name}</span><span style="color: rgba(255,255,255,0.4); font-size: 10px;">${folder.count}</span>`;

          // Highlight first folder by default
          if (index === 0) {
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
          }

          option.addEventListener('click', () => {
            optionsContainer.querySelectorAll('div').forEach(el => {
              el.style.background = 'rgba(255,255,255,0.08)';
              el.style.borderColor = 'rgba(255,255,255,0.1)';
            });
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
            selectedFolderId = folder.id;
          });

          optionsContainer.appendChild(option);
        });
      }

      // Cancel
      modal.querySelector('#bm-cancel').addEventListener('click', () => {
        modal.remove();
      });

      // Add / OK
      modal.querySelector('#bm-ok').addEventListener('click', async () => {
        modal.remove();
        try {
          await window.cardAPI.saveBookmarkToFolder({
            url: currentPageUrl,
            title: currentPageTitle,
            timestamp: Date.now()
          }, selectedFolderId);
          await checkBookmarkStatus();
          showBookmarkToast();
        } catch (err) {
          console.error('Error saving bookmark:', err);
        }
      });
    }

    // Toast confirmation after saving
    function showBookmarkToast() {
      const toast = document.createElement('div');
      toast.style.cssText = 'position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 18px; border-radius: 16px; font-size: 12px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap;';
      toast.textContent = '✓ Bookmark saved';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function normalizeUrl(raw) {
      const url = (raw || '').trim();
      if (!url) return '';
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        if (url.includes('.') && !url.includes(' ')) {
          return 'https://' + url;
        }
        return 'https://www.google.com/search?q=' + encodeURIComponent(url);
      }
      return url;
    }

    function setSplitVisibility() {
      if (!splitBtn) return;
      // Only show split button in fullscreen mode
      if (isFullscreen) {
        splitBtn.style.display = 'inline-flex';
      } else {
        splitBtn.style.display = 'none';
        // Disable split view when exiting fullscreen
        if (isSplitView) {
          isSplitView = false;
          if (splitContainer) splitContainer.classList.remove('split-active');
        }
      }
      // Set consistent background color for split button in all modes
      if (!isSplitView) {
        splitBtn.style.background = 'rgba(255,255,255,0.08)';
      } else {
        splitBtn.style.background = 'rgba(100, 255, 100, 0.8)';
      }
    }

    // Check launch size mode and set fullscreen state accordingly
    if (window.cardAPI && window.cardAPI.getCardLaunchSizeMode) {
      window.cardAPI.getCardLaunchSizeMode().then((launchMode) => {
        if (launchMode === 'fullscreen') {
          isFullscreen = true;
          setSplitVisibility();
        }
      }).catch(() => {
        // Keep default isFullscreen = false on error
      });
    }

    setSplitVisibility();

    // URL input handler - opens URL as a bubble for non-distracting background loading
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const targetUrl = normalizeUrl(urlInput.value);
        if (targetUrl) {
          // Open as bubble instead of navigating current card
          // This allows the user to continue browsing without distraction
          if (window.cardAPI && window.cardAPI.openUrlAsBubble) {
            window.cardAPI.openUrlAsBubble(targetUrl, {
              title: targetUrl,
              themeKey: theme || 'primary',
            }).then(() => {
              // Clear the input after launching as bubble
              urlInput.value = '';
            }).catch(err => {
              console.error('Failed to open URL as bubble:', err);
              // Fallback: navigate in current card
              try {
                webview.loadURL(targetUrl);
                currentPageUrl = targetUrl;
              } catch (fallbackErr) {
                window.cardAPI.navigateCard(cardId, targetUrl);
              }
            });
          } else {
            // Fallback for older API: navigate in current card
            try {
              webview.loadURL(targetUrl);
              currentPageUrl = targetUrl;
            } catch (err) {
              window.cardAPI.navigateCard(cardId, targetUrl);
            }
          }
        }
      }
    });

    // Password manager is disabled until secure OS-backed storage is implemented.

    // Check bookmark status on load
    setTimeout(checkBookmarkStatus, 1000);

    // --- Downloads for this card window ---
    if (window.cardAPI && window.cardAPI.onDownloadStarted) {
      window.cardAPI.onDownloadStarted((payload) => {
        if (!payload || !payload.id) return;
        // Reset dismissal state when a new download starts
        ringDismissed = false;
        cardDownloads.set(payload.id, {
          ...payload,
          state: payload.state || 'progressing',
        });
        updateCardDownloadRing();
      });

      window.cardAPI.onDownloadProgress((payload) => {
        if (!payload || !payload.id) return;
        const prev = cardDownloads.get(payload.id) || {};
        cardDownloads.set(payload.id, { ...prev, ...payload });
        updateCardDownloadRing();
      });

      window.cardAPI.onDownloadDone((payload) => {
        if (!payload || !payload.id) return;
        const prev = cardDownloads.get(payload.id) || {};

        // Keep completed downloads in the map so the ring stays visible
        if (payload.state === 'completed') {
          cardDownloads.set(payload.id, { ...prev, ...payload, state: 'completed' });
          const finalFilename = payload.filename || prev.filename || 'file';
          showDownloadToast(finalFilename);
        } else {
          // Remove cancelled/interrupted downloads
          cardDownloads.delete(payload.id);
        }

        updateCardDownloadRing();
      });
    }

    // Clean up downloads when card window closes
    window.addEventListener('beforeunload', () => {
      cardDownloads.clear();
      ringDismissed = false;
      stopMediaSyncLoop();
      lastActiveMediaWebview = null;
      setAudioVisualizer(false);
    });
  </script>
</body>

</html>
