<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Window</title>

  <script>
    (function applyInitialCardTheme() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const rawTheme = String(params.get('theme') || 'primary').toLowerCase();
        const normalizedTheme = rawTheme === 'alt' ? 'sunset' : rawTheme;
        const allowedThemes = new Set(['primary', 'sunset', 'ocean', 'emerald', 'amber', 'midnight', 'cocoa', 'frost']);
        const themeClass = allowedThemes.has(normalizedTheme) ? `theme-${normalizedTheme}` : 'theme-primary';
        document.documentElement.classList.add(themeClass);
        document.documentElement.setAttribute('data-card-theme', themeClass.replace('theme-', ''));
      } catch (e) { }
    })();
  </script>

  <!-- Performance optimizations -->
  <meta http-equiv="x-dns-prefetch-control" content="on">
  <link rel="dns-prefetch" href="//www.google.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="preconnect" href="https://www.google.com">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    @keyframes springPopOut {
      0% {
        transform: scale(1) translateY(0) translateZ(0);
        opacity: 1;
      }

      34% {
        transform: scale(1.06) translateY(-4px) translateZ(0);
        opacity: 1;
      }

      100% {
        transform: scale(0.24) translateY(28px) translateZ(0);
        opacity: 0;
      }
    }

    @keyframes zoomInExpand {
      0% {
        transform: scale(0.7) translateZ(0);
        opacity: 0;
      }
      55% {
        transform: scale(1.06) translateZ(0);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes tvOpenExpand {
      0% {
        transform: scaleY(0.015) scaleX(0.42) translateZ(0);
        clip-path: inset(49.3% 6% 49.3% 6% round 999px);
        opacity: 0;
        filter: brightness(1.82);
      }
      24% {
        transform: scaleY(0.08) scaleX(1.02) translateZ(0);
        clip-path: inset(46.4% 0 46.4% 0 round 999px);
        opacity: 1;
        filter: brightness(1.3);
      }
      52% {
        transform: scaleY(0.56) scaleX(1.01) translateZ(0);
        clip-path: inset(19% 0 19% 0 round 28px);
        opacity: 1;
        filter: brightness(1.12);
      }
      76% {
        transform: scaleY(0.84) scaleX(0.99) translateZ(0);
        clip-path: inset(8% 0 8% 0 round 24px);
        opacity: 1;
        filter: brightness(1.04);
      }
      100% {
        transform: scaleY(1) scaleX(1) translateZ(0);
        clip-path: inset(0 0 0 0 round 24px);
        opacity: 1;
        filter: brightness(1);
      }
    }

    @keyframes tvCloseCollapse {
      0% {
        transform: scaleY(1) scaleX(1) translateZ(0);
        clip-path: inset(0 0 0 0 round 24px);
        opacity: 1;
        filter: brightness(1);
      }

      24% {
        transform: scaleY(0.84) scaleX(0.99) translateZ(0);
        clip-path: inset(8% 0 8% 0 round 24px);
        opacity: 1;
        filter: brightness(1.04);
      }

      52% {
        transform: scaleY(0.56) scaleX(1.01) translateZ(0);
        clip-path: inset(19% 0 19% 0 round 28px);
        opacity: 1;
        filter: brightness(1.12);
      }

      76% {
        transform: scaleY(0.08) scaleX(1.02) translateZ(0);
        clip-path: inset(46.4% 0 46.4% 0 round 999px);
        opacity: 1;
        filter: brightness(1.3);
      }

      100% {
        transform: scaleY(0.015) scaleX(0.42) translateZ(0);
        clip-path: inset(49.3% 6% 49.3% 6% round 999px);
        opacity: 0;
        filter: brightness(1.82);
      }
    }

    @keyframes tvCloseFlash {
      0% {
        opacity: 0;
        transform: translateY(-50%) scaleX(0.15) translateZ(0);
      }

      52% {
        opacity: 0.88;
        transform: translateY(-50%) scaleX(1) translateZ(0);
      }

      76% {
        opacity: 0.96;
        transform: translateY(-50%) scaleX(1.04) translateZ(0);
      }

      84% {
        opacity: 0.28;
        transform: translateY(-50%) scaleX(0.94) translateZ(0);
      }

      91% {
        opacity: 1;
        transform: translateY(-50%) scaleX(1.01) translateZ(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-50%) scaleX(0.42) translateZ(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .card-window {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      --launch-signal-core: rgba(255, 255, 255, 0.2);
      --launch-signal-glow: rgba(255, 255, 255, 0.12);
      --launch-signal-shadow: rgba(0, 0, 0, 0.18);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      border: 6px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 50px 100px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      position: relative;
      transform-origin: 50% 50%;
      will-change: transform, opacity, clip-path, filter;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    /* Theme-specific card window backgrounds and borders */
    .theme-sunset .card-window,
    .theme-alt .card-window,
    .card-window.theme-sunset,
    .card-window.theme-alt {
      --launch-signal-core: rgba(255, 170, 205, 0.24);
      --launch-signal-glow: rgba(255, 100, 154, 0.16);
      --launch-signal-shadow: rgba(70, 10, 30, 0.24);
      background: linear-gradient(135deg, #ff5096 0%, #ff4646 50%, #ff8a65 100%);
      border-color: rgba(255, 200, 220, 0.6);
    }

    .theme-ocean .card-window,
    .card-window.theme-ocean {
      --launch-signal-core: rgba(190, 240, 255, 0.24);
      --launch-signal-glow: rgba(64, 190, 255, 0.16);
      --launch-signal-shadow: rgba(8, 30, 70, 0.24);
      background: linear-gradient(135deg, #00c6ff 0%, #0072ff 50%, #00d4ff 100%);
      border-color: rgba(150, 220, 255, 0.6);
    }

    .theme-emerald .card-window,
    .card-window.theme-emerald {
      --launch-signal-core: rgba(190, 255, 226, 0.24);
      --launch-signal-glow: rgba(70, 235, 170, 0.16);
      --launch-signal-shadow: rgba(8, 45, 34, 0.24);
      background: linear-gradient(135deg, #119988 0%, #38bf7d 50%, #42e695 100%);
      border-color: rgba(120, 230, 180, 0.6);
    }

    .theme-amber .card-window,
    .card-window.theme-amber {
      --launch-signal-core: rgba(255, 226, 178, 0.24);
      --launch-signal-glow: rgba(255, 149, 84, 0.16);
      --launch-signal-shadow: rgba(72, 28, 8, 0.24);
      background: linear-gradient(135deg, #ff9933 0%, #ff5e3a 50%, #ffb347 100%);
      border-color: rgba(255, 200, 150, 0.6);
    }

    .theme-midnight .card-window,
    .card-window.theme-midnight {
      --launch-signal-core: rgba(180, 192, 220, 0.18);
      --launch-signal-glow: rgba(120, 136, 184, 0.14);
      --launch-signal-shadow: rgba(0, 0, 0, 0.34);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      border-color: rgba(120, 130, 160, 0.6);
    }

    .theme-cocoa .card-window,
    .card-window.theme-cocoa {
      --launch-signal-core: rgba(255, 221, 196, 0.22);
      --launch-signal-glow: rgba(205, 150, 108, 0.15);
      --launch-signal-shadow: rgba(42, 20, 8, 0.24);
      background: linear-gradient(135deg, #6e442c 0%, #a67b5b 50%, #8b5a3c 100%);
      border-color: rgba(200, 160, 120, 0.6);
    }

    .theme-frost .card-window,
    .card-window.theme-frost {
      --launch-signal-core: rgba(255, 255, 255, 0.28);
      --launch-signal-glow: rgba(218, 232, 244, 0.16);
      --launch-signal-shadow: rgba(96, 112, 126, 0.16);
      background: linear-gradient(135deg, #c8d2dc 0%, #e6ebf0 55%, #d7e0e8 100%);
      border-color: rgba(240, 247, 255, 0.78);
    }

    /* Shimmer effect on card appearance */
    .card-window::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent);
      animation: shimmer 1.18s ease-out;
      pointer-events: none;
      z-index: 1000;
    }

.card-window::after {
      content: '';
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 1001;
      transform: translateY(-50%) scaleX(0.15) translateZ(0);
      transform-origin: center;
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.98) 18%,
          rgba(255, 255, 255, 0.98) 82%,
          rgba(255, 255, 255, 0));
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.95),
        0 0 32px rgba(255, 255, 255, 0.7);
    }

    .card-window.is-minimizing {
      /* Simplified animation for GPU */
      animation: springPopOut 260ms ease-out forwards;
      pointer-events: none;
    }

.card-window.is-opening-tv {
      animation: zoomInExpand 280ms cubic-bezier(0.22, 1, 0.36, 1) both;
      pointer-events: none;
    }

    .card-window.is-opening-tv::before,
    .card-window.is-opening-tv::after {
      opacity: 0;
      animation: none;
    }

    .card-window.is-opening-tv-bubble {
      animation: tvOpenExpand 520ms cubic-bezier(0.2, 0.72, 0.18, 1) both;
      pointer-events: none;
      transform-origin: center;
      will-change: transform, opacity, clip-path, filter;
    }

    .card-window.is-opening-tv-bubble::before,
    .card-window.is-opening-tv-bubble::after {
      opacity: 0;
      animation: none;
    }

    .card-window.is-closing-tv {
      animation: tvCloseCollapse 520ms cubic-bezier(0.2, 0.72, 0.18, 1) forwards;
      pointer-events: none;
      transform-origin: center;
      will-change: transform, opacity, clip-path, filter;
    }

    .card-window.is-closing-tv::before {
      opacity: 0;
      animation: none;
    }

    .card-window.is-closing-tv::after {
      animation: tvCloseFlash 520ms ease-out forwards;
    }

.card-window.is-restoring {
      animation: zoomInExpand 250ms cubic-bezier(0.22, 1, 0.36, 1) both;
      pointer-events: auto;
    }

    .card-window.is-restoring::before,
    .card-window.is-restoring::after {
      opacity: 0;
      animation: none;
    }

    .card-titlebar {
      height: 48px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(240, 147, 251, 0.4));
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .theme-sunset .card-titlebar,
    .theme-alt .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 80, 150, 0.45), rgba(255, 70, 70, 0.45));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-ocean .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 198, 255, 0.42), rgba(0, 114, 255, 0.44));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-emerald .card-titlebar {
      background: linear-gradient(135deg, rgba(14, 142, 70, 0.62), rgba(58, 191, 92, 0.55));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-amber .card-titlebar {
      background: linear-gradient(135deg, rgba(255, 140, 30, 0.65), rgba(255, 92, 24, 0.58));
      border-bottom: 2px solid rgba(255, 255, 255, 0.22);
    }

    .theme-midnight .card-titlebar {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.92), rgba(18, 18, 18, 0.88));
      border-bottom: 2px solid rgba(255, 255, 255, 0.18);
    }

    .theme-cocoa .card-titlebar {
      background: linear-gradient(135deg, rgba(76, 42, 24, 0.92), rgba(132, 78, 46, 0.88));
      border-bottom: 2px solid rgba(255, 220, 190, 0.22);
    }

    .theme-frost .card-titlebar {
      background: linear-gradient(135deg, rgba(235, 242, 248, 0.82), rgba(205, 218, 229, 0.72));
      border-bottom: 2px solid rgba(255, 255, 255, 0.42);
    }

    .card-titlebar:active {
      cursor: default;
    }

    .title-text {
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      margin-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      animation: fadeInSlide 0.5s ease 0.2s backwards;
    }

    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateX(-10px) translateZ(0);
      }

      to {
        opacity: 1;
        transform: translateX(0) translateZ(0);
      }
    }

    .card-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
      /* Simplified animation for GPU */
      animation: fadeInSlide 0.3s ease 0.2s backwards;
    }

    .card-button {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .card-button.size-btn {
      background: rgba(100, 200, 255, 0.7);
    }

    .card-button.size-btn:hover {
      background: rgba(120, 220, 255, 0.85);
      box-shadow: 0 2px 8px rgba(100, 200, 255, 0.5);
    }

    .card-button.minimize-btn {
      background: rgba(255, 200, 50, 0.7);
    }

     .card-button.minimize-btn:hover {
       background: rgba(255, 210, 70, 0.85);
       box-shadow: 0 2px 8px rgba(255, 200, 50, 0.5);
     }

     /* Bookmark button - dark blue */
     .card-button.bookmark-btn {
       background: rgba(30, 90, 160, 0.8);
       border: 1px solid rgba(255, 255, 255, 0.3);
       display: flex;
       align-items: center;
       justify-content: center;
       padding: 0;
     }

     .card-button.bookmark-btn img {
       width: 14px;
       height: 14px;
       pointer-events: none;
       object-fit: contain;
     }

     .card-button.bookmark-btn.bookmarked {
       background: rgba(255, 215, 0, 0.8);
       border-color: rgba(255, 215, 0, 0.9);
     }

     .card-button.bookmark-btn:hover {
       background: rgba(50, 130, 200, 0.85);
       transform: scale(1.12);
       box-shadow: 0 2px 8px rgba(50, 130, 200, 0.5);
     }

     .card-button.bookmark-btn.bookmarked:hover {
       background: rgba(255, 225, 0, 0.85);
       box-shadow: 0 2px 8px rgba(255, 215, 0, 0.6);
     }

    .card-button.bookmark-btn img {
      width: 14px;
      height: 14px;
      pointer-events: none;
      object-fit: contain;
    }

     .card-button.bookmark-btn.bookmarked {
       background: rgba(255, 215, 0, 0.3);
       border: none;
     }

     /* Readmode button - dark blue */
     .card-button.readmode-btn {
       background: rgba(30, 90, 160, 0.8);
     }

     .card-button.readmode-btn:hover {
       background: rgba(50, 130, 200, 0.85);
       transform: scale(1.12);
       box-shadow: 0 2px 8px rgba(50, 130, 200, 0.5);
     }

    .card-button:hover {
      background: rgba(255, 67, 67, 0.7);
      transform: scale(1.12);
      box-shadow: 0 2px 8px rgba(255, 67, 67, 0.4);
    }

    .card-button.size-btn:hover {
      background: rgba(67, 180, 255, 0.7);
      box-shadow: 0 2px 8px rgba(67, 180, 255, 0.4);
    }

    .card-button.minimize-btn:hover {
      background: rgba(255, 180, 30, 0.7);
      transform: scale(1.12);
      box-shadow: 0 2px 8px rgba(255, 180, 30, 0.4);
    }

     .card-button.bookmark-btn:hover {
       background: rgba(50, 130, 200, 0.7);
       transform: scale(1.12);
       box-shadow: 0 2px 8px rgba(50, 130, 200, 0.4);
     }

     .card-button.bookmark-btn.bookmarked:hover {
       background: rgba(255, 215, 0, 0.7);
       box-shadow: 0 2px 8px rgba(255, 215, 0, 0.5);
     }

     .card-button:active {
       background: rgba(255, 50, 50, 0.6);
       transform: scale(0.95);
     }

    /* Download ring styling inside card */
    .download-ring__bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.25);
      stroke-width: 3.2;
    }

    .download-ring__fg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-dasharray: 97.4;
      stroke-dashoffset: 97.4;
      transition: stroke-dashoffset 0.15s ease;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    .download-ring.indeterminate .download-ring__fg {
      stroke-dasharray: 24, 97.4;
      stroke-dashoffset: 0;
      animation: downloadRingSpin 1s linear infinite;
    }

    .download-ring.completed .download-ring__fg {
      stroke: rgba(100, 255, 100, 0.95);
    }

    .download-ring.completed .download-ring__icon {
      color: rgba(100, 255, 100, 1);
    }

    @keyframes downloadRingSpin {
      to {
        transform: rotate(270deg) translateZ(0);
      }
    }

    .card-navbar {
      height: 60px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 10;
      /* GPU acceleration */
      transform: translateZ(0);
    }

    .nav-button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Simplified transition for GPU */
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      transform: translateZ(0);
      will-change: transform;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.12) translateY(-2px) translateZ(0);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-button:active {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.95) translateZ(0);
    }

    .nav-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .url-input {
      flex: 1;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 0 12px;
      color: white;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      /* Simplified transition for GPU */
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      transform: translateZ(0);
    }

    .url-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .url-input:focus,
    .url-input.active {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1), 0 0 30px rgba(255, 107, 178, 0.6), 0 0 30px rgba(67, 97, 238, 0.6), 0 0 30px rgba(255, 77, 77, 0.6);
      transform: scale(1.02) translateZ(0);
    }

    .card-content {
      flex: 1;
      overflow: hidden;
      background: #ffffff;
      position: relative;
      isolation: isolate;
      animation: contentFadeIn 0.46s ease 0.14s backwards;
    }

    .card-content.is-awaiting-first-content {
      background: inherit;
    }

    .card-launch-fill {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: none;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 48%, var(--launch-signal-core) 0%, transparent 44%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.12)),
        inherit;
      isolation: isolate;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -20px 40px rgba(0, 0, 0, 0.08);
    }

    .card-launch-fill.active {
      display: block;
    }

    .card-launch-fill::before,
    .card-launch-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card-launch-fill::before {
      opacity: 0.95;
      background:
        repeating-linear-gradient(0deg,
          transparent 0 6px,
          rgba(255, 255, 255, 0.04) 6px 7px),
        linear-gradient(90deg,
          transparent 0 6%,
          rgba(255, 255, 255, 0.08) 6% 10%,
          transparent 10% 18%,
          rgba(255, 255, 255, 0.05) 18% 24%,
          transparent 24% 100%);
      animation: signalScanlines 220ms steps(6) infinite;
    }

    .card-launch-fill::after {
      inset: 12px;
      opacity: 0.86;
      background:

          var(--launch-signal-glow) 29% 33%,

          var(--launch-signal-shadow) 42% 45%,
          transparent 45% 100%);
      background-size:
        17% 22%,
        21% 18%,
        19% 20%,
        56px 100%,
        100% 48px;
      background-position:
        0 0,
        100% 0,
        50% 100%,

    @keyframes signalScanlines {
      0% {

        transform: translateY(1px) translateZ(0);

    @keyframes signalPixels {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        background-position:
          0 0,
          100% 0,
          50% 100%,
          0 0,
          0 0;
      }

      25% {
        transform: translate3d(1px, -1px, 0) scale(1.01);
        background-position:
          6px -4px,
          calc(100% - 8px) 2px,
          calc(50% + 2px) calc(100% - 6px),
          8px 0,
          0 10px;
      }

      50% {
        transform: translate3d(-1px, 1px, 0) scale(1.015);
        background-position:
          -4px 5px,
          calc(100% - 2px) -6px,
          calc(50% - 3px) calc(100% - 2px),
          18px 0,
          0 22px;
      }

      75% {
        transform: translate3d(2px, 0, 0) scale(1.005);
        background-position:
          10px 2px,
          calc(100% - 14px) 4px,
          calc(50% + 5px) calc(100% - 8px),
          26px 0,
          0 34px;
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);

          100% 0,

.media-hover-control {

      align-self: center;

      -webkit-app-region: no-drag;
      transform: translateZ(0);
      will-change: transform;
    }

    .audio-visualizer:hover,
    .media-hover-control.panel-open .audio-visualizer {
      background: rgba(10, 20, 30, 0.82);
      border-color: rgba(255, 111, 240, 0.5);
      box-shadow: 0 6px 16px rgba(255, 111, 240, 0.25);
    }

    .audio-visualizer span {
      width: 3px;
      height: 10px;
      border-radius: 2px;
      background: linear-gradient(180deg, #ff6ff0 0%, #7cf7ff 50%, #ff6ff0 100%);
      animation: audioPulse 2s ease-in-out infinite;
      transform-origin: bottom;
      transform: translateZ(0);
      will-change: transform, opacity;
      animation-play-state: paused;
      box-shadow: 0 0 4px rgba(255, 111, 240, 0.5), 0 0 8px rgba(124, 247, 255, 0.3);
    }

    .audio-visualizer.playing span {
      animation-play-state: running;
    }

    .audio-visualizer:not(.playing) span {
      animation-play-state: paused;
    }

    .audio-visualizer.viz-style-pulse span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      animation-name: audioPulseDot;
      animation-duration: 1.5s;
      box-shadow: 0 0 6px rgba(255, 111, 240, 0.4), 0 0 10px rgba(124, 247, 255, 0.3);
    }

    .audio-visualizer.viz-style-ladder span:nth-child(1) {
      height: 7px;
      animation-duration: 1.4s;
    }

    .audio-visualizer.viz-style-ladder span:nth-child(2) {
      height: 10px;
      animation-duration: 1.6s;
    }

    .audio-visualizer.viz-style-ladder span:nth-child(3) {
      height: 13px;
      animation-duration: 1.4s;
    }

    .audio-visualizer.viz-style-ladder span {
      width: 3px;
      border-radius: 999px;
      animation-name: audioPulseTall;
      box-shadow: 0 0 4px rgba(255, 111, 240, 0.4);
    }

    .audio-visualizer.viz-style-orbit {
      align-items: center;

    .audio-visualizer.viz-style-orbit span {

<body>
  <div class="card-window">

</button>

  <script>
    // Get card ID and initial URL from query parameters
    const params = new URLSearchParams(window.location.search);
    let cardId = params.get('cardId');
    cardId = parseInt(cardId, 10);
    const encodedUrl = params.get('url');
    const theme = (params.get('theme') || 'primary').toLowerCase();
    const normalizedTheme = theme === 'alt' ? 'sunset' : theme;

    let initialUrl = null;
    if (encodedUrl) {
      try {
        initialUrl = atob(encodedUrl);
      } catch (e) {
        initialUrl = decodeURIComponent(encodedUrl);
      }
    }

    // Apply theme
    const cardWindowEl = document.querySelector('.card-window');
    const isBubbleMode = params.get('bubble') === '1';
    if (cardWindowEl) {
      const allThemeClasses = ['theme-alt', 'theme-sunset', 'theme-ocean', 'theme-emerald', 'theme-amber', 'theme-midnight', 'theme-cocoa', 'theme-frost'];
      allThemeClasses.forEach((cls) => cardWindowEl.classList.remove(cls));
      if (normalizedTheme !== 'primary') {
        cardWindowEl.classList.add(`theme-${normalizedTheme}`);
      }
      // Set opening animation based on mode (skip for bubble mode - show instantly)
      if (!isBubbleMode) {
        cardWindowEl.classList.add('is-opening-tv');
      }
    }

    // Get DOM elements
    const closeBtn = document.getElementById('close-btn');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const wideBtn = document.getElementById('wide-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const minimizeBtn = document.getElementById('minimize-btn');
    const bookmarkBtn = document.getElementById('bookmark-btn');
    const readmodeBtn = document.getElementById('readmode-btn');
    const splitBtn = document.getElementById('split-btn');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    const zoomInBtn = document.getElementById('zoom-in-btn');
    const zoomPercent = document.getElementById('zoom-percent');
    const urlInput = document.getElementById('url-input');
    const titleElement = document.querySelector('.title-text');
    const webview = document.getElementById('card-webview');
    const splitContainer = document.getElementById('split-container');
    const splitRightPane = document.getElementById('split-pane-right');

        try {

            muted: !!active.muted,
            hasDuration,
            remainingSeconds,

          startWidgetMediaStateSync();
          const preciseMediaType = preciseState.isVideo ? 'video' : 'audio';
          mediaPlayingState.set(eventDriven.target, { isPlaying: true, mediaType: preciseMediaType });
           publishBubbleMediaState({
             isPlaying: true,
             hasMedia: true,
             isVideo: !!preciseState.isVideo,
             isLive: !!preciseState.isLive,
             hasDuration: !!preciseState.hasDuration,
             remainingSeconds: Number.isFinite(Number(preciseState.remainingSeconds)) ? Number(preciseState.remainingSeconds) : null,
             muted: !!preciseState.muted,
             volume: Number.isFinite(Number(preciseState.volume)) ? Number(preciseState.volume) : 1,
             currentTime: Number.isFinite(Number(preciseState.currentTime)) ? Number(preciseState.currentTime) : 0,
             durationSeconds: Number.isFinite(Number(preciseState.durationSeconds)) ? Number(preciseState.durationSeconds) : null,
             mediaTitle: preciseState.mediaTitle || '',
             mediaArtist: preciseState.mediaArtist || '',
             mediaAlbum: preciseState.mediaAlbum || ''
           });
          return;
        }

        let mediaType = String(eventDriven.state?.mediaType || 'unknown').toLowerCase();
        if (mediaType === 'unknown') {
          mediaType = await detectPlayingMediaType(eventDriven.target);
          if (token !== bubblePlaybackRefreshToken) return;
          if (mediaType !== 'unknown') {
            mediaPlayingState.set(eventDriven.target, { isPlaying: true, mediaType });
          }
        }
        startWidgetMediaStateSync();
        publishBubbleStateForMediaType(mediaType, true);
        return;
      }

      const result = await getBestMediaTarget({ bypassPending: true });
      if (token !== bubblePlaybackRefreshToken) return;
      const state = result?.state;
      if (state && state.hasMedia) {
        if (state.isPlaying) {
          startWidgetMediaStateSync();
        } else {
          stopWidgetMediaStateSync();
        }
        publishBubbleMediaState({
          isPlaying: !!state.isPlaying,
          hasMedia: true,
          isVideo: !!state.isVideo,
          isLive: !!state.isLive,
          hasDuration: !!state.hasDuration,
          remainingSeconds: Number.isFinite(Number(state.remainingSeconds)) ? Math.max(0, state.remainingSeconds) : null,
          muted: !!state.muted,
          volume: Number.isFinite(Number(state.volume)) ? Math.max(0, Math.min(1, state.volume)) : 1,
          currentTime: Number.isFinite(Number(state.currentTime)) ? Math.max(0, Number(state.currentTime)) : 0,
          durationSeconds: Number.isFinite(Number(state.durationSeconds)) ? Math.max(0, Number(state.durationSeconds)) : null,
          mediaTitle: state.mediaTitle || '',
          mediaArtist: state.mediaArtist || '',
          mediaAlbum: state.mediaAlbum || ''
        });
        return;
      }
      stopWidgetMediaStateSync();
      publishBubbleMediaState({ isPlaying: false, hasMedia: false, isVideo: false, isLive: false, hasDuration: false, remainingSeconds: null, muted: false, volume: 1 });
    }

    let visualizerRefreshToken = 0;

    async function controlMedia(action, value) {
      const safeVolume = Number.isFinite(value) ? Math.max(0, Math.min(1, value)) : 1;
      let script = '';
      if (action === 'toggle') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            if (!active.paused && !active.ended) {
              active.pause();
            } else {
              const p = active.play();
              if (p && typeof p.catch === 'function') p.catch(() => {});
            }
            return true;
          })();
        `;
      } else if (action === 'volume') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            active.volume = ${safeVolume};
            if (active.volume > 0 && active.muted) active.muted = false;
            return true;
          })();
        `;
      } else if (action === 'mute') {
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            active.muted = !active.muted;
            return true;
          })();
        `;
      } else if (action === 'seek') {
        const offset = Number.isFinite(value) ? value : 0;
        script = `
          (() => {
            const media = Array.from(document.querySelectorAll('video, audio'));
            if (!media.length) return null;
            const active = media.find((m) => !m.paused && !m.ended) || media.find((m) => (m.currentSrc || m.src)) || media[0];
            if (!active) return null;
            const duration = Number(active.duration);
            if (!Number.isFinite(duration) || duration <= 0) return null;
            active.currentTime = Math.max(0, Math.min(duration, active.currentTime + ${offset}));
            return true;
          })();
        `;
      }

      if (!script) return;
      const targets = getMediaCommandTargets();
      let actedTarget = null;
      for (const target of targets) {
        const result = await runMediaScript(target, script, { bypassPending: true });
        clearMediaStateCache(target);
        if (result) {
          actedTarget = target;
          lastActiveMediaWebview = target;
          break;
        }
      }
      if (actedTarget) {
        const targetState = await readMediaState(actedTarget, { bypassPending: true });
        if (targetState && targetState.hasMedia) {
          renderMediaControl(targetState);
        }
      }
      setTimeout(() => {
        updateBubblePlaybackState();
        updateVisualizerPlaybackState();
        updateVisualLockAnimationState();
        if (mediaPanelOpen) {
          scheduleMediaPanelSyncStart();
        }
      }, 80);
    }

        const nextOpen = !mediaPanelOpen;
        setMediaPanelOpen(nextOpen);

      audioVisualizer.addEventListener('wheel', (event) => {

    window.addEventListener('visualizer-widget-command', (event) => {
      const detail = event && event.detail && typeof event.detail === 'object' ? event.detail : {};

      if (!action) return;

      if (action === 'toggle' || action === 'mute') {

      if (action === 'seek') {

      if (action === 'volume') {

        }
        return;
      }
      if (action === 'style-next') {
        cycleVisualizerStyle(1);
      } else if (action === 'style-prev') {

      } else if (action === 'visual-lock') {
        setVisualLockActive(true);

    function updateCardDownloadRing() {
      if (!cardDownloadRingBtn) return;

      // Hide if dismissed or no downloads at all
      if (ringDismissed || cardDownloads.size === 0) {
        cardDownloadRingBtn.style.display = 'none';
        cardDownloadRingBtn.setAttribute('aria-hidden', 'true');
        cardDownloadRingBtn.classList.remove('indeterminate');
        cardDownloadRingBtn.classList.remove('completed');
        return;
      }

      cardDownloadRingBtn.style.display = 'inline-flex';
      cardDownloadRingBtn.setAttribute('aria-hidden', 'false');

      const active = Array.from(cardDownloads.values()).filter(d => d && d.state !== 'completed');
      const completed = Array.from(cardDownloads.values()).filter(d => d && d.state === 'completed');

      // If all downloads are completed, show checkmark style
      if (active.length === 0 && completed.length > 0) {
        cardDownloadRingBtn.classList.remove('indeterminate');
        cardDownloadRingBtn.classList.add('completed');
        if (cardDownloadRingFg) {
          cardDownloadRingFg.style.strokeDashoffset = '0'; // Full ring
        }
        const iconEl = cardDownloadRingBtn.querySelector('.download-ring__icon');
        if (iconEl) {
          iconEl.textContent = '✓';
        }
        cardDownloadRingBtn.title = `${completed.length} download${completed.length > 1 ? 's' : ''} completed - Click to open`;
        return;
      }

      // Reset icon to download arrow for active downloads
      const iconEl = cardDownloadRingBtn.querySelector('.download-ring__icon');
      if (iconEl) {
        iconEl.textContent = '⬇';
      }

      // Show progress for active downloads
      cardDownloadRingBtn.classList.remove('completed');
      let receivedSum = 0;
      let totalSum = 0;
      let hasTotal = true;
      active.forEach(d => {
        receivedSum += d.receivedBytes || 0;
        if (d.totalBytes && d.totalBytes > 0) {
          totalSum += d.totalBytes;
        } else {
          hasTotal = false;
        }
      });

      if (!hasTotal || totalSum <= 0) {
        cardDownloadRingBtn.classList.add('indeterminate');
        cardDownloadRingBtn.title = 'Downloading...';
        return;
      }

      cardDownloadRingBtn.classList.remove('indeterminate');
      const progress = Math.max(0, Math.min(1, receivedSum / totalSum));
      const circumference = 97.4;
      const offset = circumference * (1 - progress);
      if (cardDownloadRingFg) {
        cardDownloadRingFg.style.strokeDashoffset = String(offset);
      }
      cardDownloadRingBtn.title = `Downloading... ${Math.round(progress * 100)}%`;
    }

      try {
        const isBookmarked = await window.cardAPI.isBookmarked(currentPageUrl);

        if (isBookmarked) {
          // Already bookmarked - remove it directly
          await window.cardAPI.toggleBookmark({
            url: currentPageUrl,
            title: currentPageTitle,
            timestamp: Date.now()
          });
          await checkBookmarkStatus();
        } else {
          // Not bookmarked - show confirmation modal on this card
          const folders = await window.cardAPI.getBookmarkFolders();
          showBookmarkModal(folders);
        }
      } catch (err) {
        console.error('Error toggling bookmark:', err);
      }
    });

    // --- Bookmark confirmation modal (rendered on the card) ---
    function showBookmarkModal(folders) {
      // Build modal HTML
      let folderPickerHTML = '';
      if (folders.length >= 2) {
        folderPickerHTML = `
          <label style="color: rgba(255,255,255,0.7); font-size: 11px; display: block; margin-bottom: 6px;">Save to folder:</label>
          <div id="bm-folder-options" style="display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; margin-bottom: 12px;"></div>
        `;
      }

      const modal = document.createElement('div');
      modal.id = 'bm-modal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center;';
      modal.innerHTML = `
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
          <h3 style="color: white; margin: 0 0 6px 0; font-size: 14px;">Add Bookmark</h3>
          <p style="color: rgba(255,255,255,0.7); font-size: 11px; margin: 0 0 14px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${currentPageTitle || currentPageUrl}</p>
          ${folderPickerHTML}
          <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button id="bm-cancel" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; cursor: pointer;">Cancel</button>
            <button id="bm-ok" style="padding: 6px 14px; font-size: 11px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; cursor: pointer;">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      // Build folder options if 2+ folders
      let selectedFolderId = folders.length > 0 ? folders[0].id : null;

      if (folders.length >= 2) {
        const optionsContainer = modal.querySelector('#bm-folder-options');
        folders.forEach((folder, index) => {
          const option = document.createElement('div');
          option.style.cssText = 'display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); transition: all 0.15s ease;';
          option.innerHTML = `<span style="font-size: 13px;">📁</span><span style="color: white; font-size: 11px; flex: 1;">${folder.name}</span><span style="color: rgba(255,255,255,0.4); font-size: 10px;">${folder.count}</span>`;

          // Highlight first folder by default
          if (index === 0) {
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
          }

          option.addEventListener('click', () => {
            optionsContainer.querySelectorAll('div').forEach(el => {
              el.style.background = 'rgba(255,255,255,0.08)';
              el.style.borderColor = 'rgba(255,255,255,0.1)';
            });
            option.style.background = 'rgba(255,255,255,0.18)';
            option.style.borderColor = 'rgba(255,255,255,0.4)';
            selectedFolderId = folder.id;
          });

          optionsContainer.appendChild(option);
        });
      }

      // Cancel
      modal.querySelector('#bm-cancel').addEventListener('click', () => {
        modal.remove();
      });

      // Add / OK
      modal.querySelector('#bm-ok').addEventListener('click', async () => {
        modal.remove();
        try {
          await window.cardAPI.saveBookmarkToFolder({
            url: currentPageUrl,
            title: currentPageTitle,
            timestamp: Date.now()
          }, selectedFolderId);
          await checkBookmarkStatus();
          showBookmarkToast();
        } catch (err) {
          console.error('Error saving bookmark:', err);
        }
      });
    }

    // Toast confirmation after saving
    function showBookmarkToast() {
      const toast = document.createElement('div');
      toast.style.cssText = 'position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 18px; border-radius: 16px; font-size: 12px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap;';
      toast.textContent = '✓ Bookmark saved';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function normalizeUrl(raw) {
      const url = (raw || '').trim();
      if (!url) return '';
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        if (url.includes('.') && !url.includes(' ')) {
          return 'https://' + url;
        }
        return 'https://www.google.com/search?q=' + encodeURIComponent(url);
      }
      return url;
    }

    function setSplitVisibility() {
      if (!splitBtn) return;
      // Only show split button in fullscreen mode
      if (isFullscreen) {
        splitBtn.style.display = 'inline-flex';
      } else {
        splitBtn.style.display = 'none';
        // Disable split view when exiting fullscreen
        if (isSplitView) {
          isSplitView = false;
          if (splitContainer) splitContainer.classList.remove('split-active');
        }
      }
      // Set consistent background color for split button in all modes
      if (!isSplitView) {
        splitBtn.style.background = 'rgba(255,255,255,0.08)';
      } else {
        splitBtn.style.background = 'rgba(100, 255, 100, 0.8)';
      }
    }

    // Check launch size mode and set fullscreen state accordingly
    if (window.cardAPI && window.cardAPI.getCardLaunchSizeMode) {
      window.cardAPI.getCardLaunchSizeMode().then((launchMode) => {
        if (launchMode === 'fullscreen') {
          isFullscreen = true;
          setSplitVisibility();
        }
      }).catch(() => {
        // Keep default isFullscreen = false on error
      });
    }

    setSplitVisibility();

    // URL input handler - opens URL as a bubble for non-distracting background loading
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const targetUrl = normalizeUrl(urlInput.value);
        if (targetUrl) {
          // Open as bubble instead of navigating current card
          // This allows the user to continue browsing without distraction
          if (window.cardAPI && window.cardAPI.openUrlAsBubble) {
            window.cardAPI.openUrlAsBubble(targetUrl, {
              title: targetUrl,
              themeKey: theme || 'primary',
            }).then(() => {
              // Clear the input after launching as bubble
              urlInput.value = '';
              urlInput.classList.remove('active');
            }).catch(err => {
              console.error('Failed to open URL as bubble:', err);
              // Fallback: navigate in current card
              try {
                webview.loadURL(targetUrl);
                currentPageUrl = targetUrl;
              } catch (fallbackErr) {
                window.cardAPI.navigateCard(cardId, targetUrl);
              }
            });
          } else {
            // Fallback for older API: navigate in current card
            try {
              webview.loadURL(targetUrl);
              currentPageUrl = targetUrl;
              urlInput.value = '';
              urlInput.classList.remove('active');
            } catch (err) {
              window.cardAPI.navigateCard(cardId, targetUrl);
            }
          }
        }
      }
    });

    // Add active class for glow effect when typing
    urlInput.addEventListener('focus', () => {
      urlInput.classList.add('active');
    });

    urlInput.addEventListener('input', () => {
      if (urlInput.value.trim()) {
        urlInput.classList.add('active');
      }
    });

    urlInput.addEventListener('blur', () => {
      if (!urlInput.value.trim()) {
        urlInput.classList.remove('active');
      }
    });

    // Password manager is disabled until secure OS-backed storage is implemented.

    // Check bookmark status on load
    setTimeout(checkBookmarkStatus, 1000);

    // --- Downloads for this card window ---
    if (window.cardAPI && window.cardAPI.onDownloadStarted) {
      window.cardAPI.onDownloadStarted((payload) => {
        if (!payload || !payload.id) return;
        // Reset dismissal state when a new download starts
        ringDismissed = false;
        cardDownloads.set(payload.id, {
          ...payload,
          state: payload.state || 'progressing',
        });
        updateCardDownloadRing();
      });

      window.cardAPI.onDownloadProgress((payload) => {
        if (!payload || !payload.id) return;
        const prev = cardDownloads.get(payload.id) || {};
        cardDownloads.set(payload.id, { ...prev, ...payload });
        updateCardDownloadRing();
      });

      window.cardAPI.onDownloadDone((payload) => {
        if (!payload || !payload.id) return;
        const prev = cardDownloads.get(payload.id) || {};

        // Keep completed downloads in the map so the ring stays visible
        if (payload.state === 'completed') {
          cardDownloads.set(payload.id, { ...prev, ...payload, state: 'completed' });
          const finalFilename = payload.filename || prev.filename || 'file';
          showDownloadToast(finalFilename);
        } else {
          // Remove cancelled/interrupted downloads
          cardDownloads.delete(payload.id);
        }

        updateCardDownloadRing();
      });
    }

    // Clean up downloads when card window closes
    window.addEventListener('beforeunload', () => {
      clearMainLoadGuard();
      clearSplitLoadGuard();
      stopNetworkRecoveryWatcher();
      cardDownloads.clear();
      ringDismissed = false;
      stopWidgetMediaStateSync();
      stopMediaSyncLoop();
      lastActiveMediaWebview = null;
      setAudioVisualizer(false);
    });
  </script>
</body>

</html>
