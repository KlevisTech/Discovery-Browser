<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Flames Widget</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      opacity: 0;
      transition: opacity 140ms ease;
    }

    body.ready {
      opacity: 1;
    }

    body.hidden {
      opacity: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body class="hidden">
  <canvas id="flame-canvas" aria-hidden="true"></canvas>

  <script>
    const params = new URLSearchParams(window.location.search || '');
    const initialTheme = String(params.get('theme') || 'primary').toLowerCase() === 'frost'
      ? 'solstice'
      : String(params.get('theme') || 'primary').toLowerCase();
    const canvas = document.getElementById('flame-canvas');
    const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
    const MAX_DPR = 1.35;
    const FPS_PLAYING = 20;
    const FPS_IDLE = 12;
    const MOTION_SPEED = 0.45;
    const palettes = {
      primary: { hot: [255, 118, 222], core: [92, 222, 255], warm: [255, 196, 108] },
      sunset: { hot: [255, 118, 178], core: [255, 164, 116], warm: [255, 213, 133] },
      ocean: { hot: [92, 184, 255], core: [116, 248, 255], warm: [162, 236, 255] },
      emerald: { hot: [72, 240, 172], core: [190, 255, 236], warm: [121, 248, 197] },
      amber: { hot: [255, 134, 72], core: [255, 212, 126], warm: [255, 237, 174] },
      midnight: { hot: [152, 168, 255], core: [194, 220, 255], warm: [120, 144, 212] },
      cocoa: { hot: [214, 150, 104], core: [255, 220, 188], warm: [186, 126, 88] },
      solstice: { hot: [255, 180, 58], core: [255, 237, 150], warm: [255, 246, 201] },
    };
    let widgetState = {
      isPlaying: false,
      volume: 1,
      sideFlamesEnabled: false,
      cardShape: 'default',
      themeKey: initialTheme,
    };
    let isEnabled = false;
    let rafId = 0;
    let lastFrameAt = 0;
    let dpr = 1;
    let width = 1;
    let height = 1;
    const sparks = Array.from({ length: 22 }, (_, index) => ({
      seed: index * 37.91,
      side: index % 2 === 0 ? -1 : 1,
      lane: (index % 11) / 10,
      phase: (index * 0.19) % 1,
    }));

    function normalizeTheme(themeKey) {
      const requested = String(themeKey || 'primary').toLowerCase();
      const normalized = requested === 'alt'
        ? 'sunset'
        : (requested === 'frost' ? 'solstice' : requested);
      return palettes[normalized] ? normalized : 'primary';
    }

    function rgba(rgb, alpha) {
      return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${Math.max(0, Math.min(1, alpha))})`;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      dpr = Math.min(MAX_DPR, Math.max(1, window.devicePixelRatio || 1));
      width = Math.max(1, Math.round(rect.width));
      height = Math.max(1, Math.round(rect.height));
      const nextWidth = Math.max(1, Math.round(width * dpr));
      const nextHeight = Math.max(1, Math.round(height * dpr));
      if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
        canvas.width = nextWidth;
        canvas.height = nextHeight;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function makeRadial(x, y, r0, r1, stops) {
      const gradient = ctx.createRadialGradient(x, y, r0, x, y, r1);
      stops.forEach(([offset, color]) => gradient.addColorStop(offset, color));
      return gradient;
    }

    function drawCurvedGlow(cx, mirror, time, palette, energy, playing) {
      const baseY = height - 18;
      const t = time * MOTION_SPEED;
      const pulse = 0.88 + Math.sin(t * 0.0032 + mirror) * 0.06;
      const reach = Math.min(190, Math.max(116, width * 0.19));
      const lift = playing ? 24 : 16;
      ctx.save();
      ctx.translate(cx, baseY);
      ctx.scale(mirror, 1);
      ctx.globalCompositeOperation = 'lighter';

      ctx.fillStyle = makeRadial(0, 0, 0, reach * pulse, [
        [0, rgba(palette.core, 0.36 * energy)],
        [0.32, rgba(palette.hot, 0.24 * energy)],
        [0.72, rgba(palette.warm, 0.09 * energy)],
        [1, rgba(palette.hot, 0)],
      ]);
      ctx.beginPath();
      ctx.ellipse(0, 0, reach, 32 + lift, -0.22, Math.PI, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = makeRadial(28, -4, 0, reach * 0.58, [
        [0, rgba(palette.core, 0.42 * energy)],
        [0.44, rgba(palette.hot, 0.2 * energy)],
        [1, rgba(palette.hot, 0)],
      ]);
      ctx.beginPath();
      ctx.ellipse(26, -2, reach * 0.62, 22 + lift * 0.45, -0.12, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTongue(cx, mirror, time, palette, energy, index) {
      const baseY = height - 16;
      const t = time * MOTION_SPEED;
      const sway = Math.sin(t * 0.004 + index * 1.7) * 6;
      const flameHeight = (34 + index * 9) * (0.82 + energy * 0.42);
      const flameWidth = 18 + index * 4;
      const x = cx + mirror * (24 + index * 19 + sway);
      const y = baseY - 6;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = makeRadial(x, y - flameHeight * 0.18, 0, flameHeight * 0.92, [
        [0, rgba(palette.core, 0.5 * energy)],
        [0.38, rgba(palette.hot, 0.34 * energy)],
        [0.78, rgba(palette.warm, 0.12 * energy)],
        [1, rgba(palette.hot, 0)],
      ]);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(
        x - mirror * flameWidth,
        y - flameHeight * 0.28,
        x - mirror * (flameWidth * 0.24),
        y - flameHeight * 0.82,
        x + mirror * (flameWidth * 0.15),
        y - flameHeight
      );
      ctx.bezierCurveTo(
        x + mirror * (flameWidth * 1.05),
        y - flameHeight * 0.58,
        x + mirror * (flameWidth * 0.68),
        y - flameHeight * 0.18,
        x,
        y
      );
      ctx.fill();
      ctx.restore();
    }

    function drawSpark(spark, time, palette, energy) {
      const sideX = spark.side < 0 ? Math.max(34, width * 0.055) : width - Math.max(34, width * 0.055);
      const localWidth = Math.min(160, width * 0.18);
      const t = time * MOTION_SPEED;
      const progress = (spark.phase + (t * 0.00008 * (0.7 + energy))) % 1;
      const x = sideX + spark.side * (spark.lane * localWidth + Math.sin(t * 0.002 + spark.seed) * 6);
      const y = height - 18 - progress * (46 + energy * 30);
      const radius = 1.1 + (1 - progress) * 2.2;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = rgba(progress < 0.42 ? palette.core : palette.hot, (1 - progress) * 0.34 * energy);
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render(timestamp) {
      if (!isEnabled) {
        rafId = 0;
        return;
      }
      const targetFps = widgetState.isPlaying ? FPS_PLAYING : FPS_IDLE;
      const minFrameMs = 1000 / targetFps;
      if (timestamp - lastFrameAt < minFrameMs) {
        rafId = requestAnimationFrame(render);
        return;
      }
      lastFrameAt = timestamp;
      resizeCanvas();
      ctx.clearRect(0, 0, width, height);

      const theme = normalizeTheme(widgetState.themeKey);
      const palette = palettes[theme];
      const volume = Number.isFinite(Number(widgetState.volume))
        ? Math.max(0.14, Math.min(1, Number(widgetState.volume)))
        : 0.72;
      const energy = widgetState.isPlaying ? (0.72 + volume * 0.34) : 0.5;
      const leftX = Math.max(36, width * 0.055);
      const rightX = width - leftX;

      drawCurvedGlow(leftX, 1, timestamp, palette, energy, widgetState.isPlaying);
      drawCurvedGlow(rightX, -1, timestamp, palette, energy, widgetState.isPlaying);
      for (let i = 0; i < 3; i += 1) {
        drawTongue(leftX, 1, timestamp, palette, energy, i);
        drawTongue(rightX, -1, timestamp + 120, palette, energy, i);
      }
      if (widgetState.isPlaying) {
        sparks.forEach((spark) => drawSpark(spark, timestamp, palette, energy));
      }

      rafId = requestAnimationFrame(render);
    }

    function startRenderer() {
      if (rafId) return;
      lastFrameAt = 0;
      rafId = requestAnimationFrame(render);
    }

    function stopRenderer() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = 0;
      ctx.clearRect(0, 0, width, height);
    }

    function applyState(payload) {
      const next = payload && typeof payload === 'object' ? payload : {};
      widgetState = { ...widgetState, ...next };
      const shapeKey = String(widgetState.cardShape || 'default').toLowerCase();
      const flamesAvailable = shapeKey === 'wave' || shapeKey === 'curve';
      isEnabled = widgetState.sideFlamesEnabled === true && flamesAvailable;
      document.body.classList.add('ready');
      document.body.classList.toggle('hidden', !isEnabled);
      if (isEnabled) {
        startRenderer();
      } else {
        stopRenderer();
      }
    }

    resizeCanvas();
    document.body.classList.add('ready');
    window.addEventListener('resize', resizeCanvas);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopRenderer();
      } else if (isEnabled) {
        startRenderer();
      }
    });

    if (window.sideFlamesWidgetAPI && window.sideFlamesWidgetAPI.onStateUpdate) {
      window.sideFlamesWidgetAPI.onStateUpdate((payload) => {
        applyState(payload);
      });
    }
  </script>
</body>
</html>
