<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Flames Widget</title>
  <style>
    :root {
      --flame-hot: rgba(255, 144, 220, 0.92);
      --flame-core: rgba(120, 238, 255, 0.95);
      --flame-warm: rgba(255, 214, 120, 0.74);
      --flame-shadow: rgba(18, 12, 36, 0.5);
      --flame-energy: 0.85;
      --flame-opacity: 0.96;
      --flame-scale: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      opacity: 0;
      transition: opacity 180ms ease;
    }

    body.ready {
      opacity: 1;
    }

    body.hidden {
      opacity: 0;
    }

    .flames-root {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0 0 18px;
      overflow: hidden;
      isolation: isolate;
    }

    .flame-side {
      position: absolute;
      bottom: 24px;
      width: 132px;
      height: 102px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform-origin: bottom center;
      opacity: var(--flame-opacity);
      filter:
        drop-shadow(0 0 10px color-mix(in srgb, var(--flame-hot) 56%, transparent))
        drop-shadow(0 0 24px color-mix(in srgb, var(--flame-core) 50%, transparent));
    }

    .flame-side.left {
      left: 28px;
    }

    .flame-side.right {
      right: 28px;
      transform: scaleX(-1);
    }

    .flame-bed {
      position: absolute;
      bottom: 8px;
      left: 22px;
      right: 22px;
      height: 20px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--flame-core) 72%, transparent) 0%, transparent 68%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--flame-hot) 86%, transparent) 0%, transparent 78%);
      opacity: calc(0.62 + (var(--flame-energy) * 0.24));
      filter: blur(7px);
    }

    .flame-column {
      position: relative;
      width: 15px;
      height: 82px;
      margin: 0 2px;
      transform-origin: bottom center;
      animation: flameBounce calc(1.7s - (var(--flame-energy) * 0.22s)) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .flame-side.idle .flame-column {
      animation-duration: 2.35s;
    }

    .flame-core,
    .flame-outer,
    .flame-mist {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50% 50% 44% 44% / 70% 70% 30% 30%;
    }

    .flame-outer {
      width: 100%;
      height: calc(34px + (var(--size, 1) * 24px * var(--flame-scale)));
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--flame-core) 28%, transparent) 0%,
          color-mix(in srgb, var(--flame-hot) 92%, transparent) 52%,
          color-mix(in srgb, var(--flame-warm) 74%, transparent) 100%);
      filter: blur(1px);
      opacity: calc(0.78 + (var(--flame-energy) * 0.16));
    }

    .flame-core {
      width: 58%;
      height: calc(24px + (var(--size, 1) * 18px * var(--flame-scale)));
      background:
        linear-gradient(180deg,
          rgba(255, 255, 255, 0.96) 0%,
          color-mix(in srgb, var(--flame-core) 96%, white 4%) 42%,
          color-mix(in srgb, var(--flame-hot) 72%, transparent) 100%);
      filter: blur(0.6px);
      opacity: calc(0.82 + (var(--flame-energy) * 0.14));
    }

    .flame-mist {
      width: 138%;
      height: calc(20px + (var(--size, 1) * 14px * var(--flame-scale)));
      background:
        radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--flame-core) 70%, transparent) 0%, transparent 70%),
        radial-gradient(circle at 50% 60%, color-mix(in srgb, var(--flame-hot) 46%, transparent) 0%, transparent 82%);
      filter: blur(6px);
      opacity: calc(0.36 + (var(--flame-energy) * 0.18));
    }

    .flame-column:nth-child(2) { --size: 0.88; --delay: -0.14s; }
    .flame-column:nth-child(3) { --size: 1.02; --delay: -0.28s; }

    .flame-side.playing .flame-column:nth-child(2n) {
      animation-name: flameLean;
    }

    @keyframes flameBounce {
      0%, 100% {
        transform: translateY(0) scaleY(0.84) scaleX(0.94);
      }
      35% {
        transform: translateY(-3px) scaleY(1.03) scaleX(1);
      }
      70% {
        transform: translateY(-6px) scaleY(1.11) scaleX(1.03);
      }
    }

    @keyframes flameLean {
      0%, 100% {
        transform: translateY(0) rotate(-2deg) scaleY(0.84);
      }
      40% {
        transform: translateY(-4px) rotate(3deg) scaleY(1.05);
      }
      75% {
        transform: translateY(-7px) rotate(-4deg) scaleY(1.12);
      }
    }

    .theme-primary {
      --flame-hot: rgba(255, 118, 222, 0.94);
      --flame-core: rgba(92, 222, 255, 0.96);
      --flame-warm: rgba(255, 196, 108, 0.74);
    }

    .theme-sunset {
      --flame-hot: rgba(255, 118, 178, 0.96);
      --flame-core: rgba(255, 164, 116, 0.94);
      --flame-warm: rgba(255, 213, 133, 0.8);
    }

    .theme-ocean {
      --flame-hot: rgba(92, 184, 255, 0.92);
      --flame-core: rgba(116, 248, 255, 0.96);
      --flame-warm: rgba(162, 236, 255, 0.7);
    }

    .theme-emerald {
      --flame-hot: rgba(72, 240, 172, 0.94);
      --flame-core: rgba(190, 255, 236, 0.94);
      --flame-warm: rgba(121, 248, 197, 0.74);
    }

    .theme-amber {
      --flame-hot: rgba(255, 134, 72, 0.96);
      --flame-core: rgba(255, 212, 126, 0.95);
      --flame-warm: rgba(255, 237, 174, 0.82);
    }

    .theme-midnight {
      --flame-hot: rgba(152, 168, 255, 0.86);
      --flame-core: rgba(194, 220, 255, 0.9);
      --flame-warm: rgba(120, 144, 212, 0.66);
    }

    .theme-cocoa {
      --flame-hot: rgba(214, 150, 104, 0.92);
      --flame-core: rgba(255, 220, 188, 0.94);
      --flame-warm: rgba(186, 126, 88, 0.76);
    }

    .theme-frost {
      --flame-hot: rgba(194, 226, 255, 0.92);
      --flame-core: rgba(255, 255, 255, 0.98);
      --flame-warm: rgba(215, 242, 255, 0.78);
    }
  </style>
</head>
<body>
  <div class="flames-root" aria-hidden="true">
    <div class="flame-side left idle" id="left-flame">
      <div class="flame-bed"></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
    </div>
    <div class="flame-side right idle" id="right-flame">
      <div class="flame-bed"></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
      <div class="flame-column"><span class="flame-mist"></span><span class="flame-outer"></span><span class="flame-core"></span></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search || '');
    const initialTheme = String(params.get('theme') || 'primary').toLowerCase();
    const leftFlame = document.getElementById('left-flame');
    const rightFlame = document.getElementById('right-flame');
    const themeClasses = ['theme-primary', 'theme-sunset', 'theme-ocean', 'theme-emerald', 'theme-amber', 'theme-midnight', 'theme-cocoa', 'theme-frost'];
    let widgetState = {
      isPlaying: false,
      volume: 1,
      sideFlamesEnabled: false,
      cardShape: 'default',
      themeKey: initialTheme,
    };

    function applyTheme(themeKey) {
      const normalized = String(themeKey || 'primary').toLowerCase() === 'alt'
        ? 'sunset'
        : String(themeKey || 'primary').toLowerCase();
      themeClasses.forEach((name) => document.body.classList.remove(name));
      document.body.classList.add(`theme-${normalized}`);
    }

    function applyState(payload) {
      const next = payload && typeof payload === 'object' ? payload : {};
      widgetState = { ...widgetState, ...next };
      applyTheme(widgetState.themeKey || initialTheme);
      const isWave = String(widgetState.cardShape || 'default').toLowerCase() === 'wave';
      const enabled = widgetState.sideFlamesEnabled === true && isWave;
      const playing = enabled && widgetState.isPlaying === true;
      const volume = Number.isFinite(Number(widgetState.volume))
        ? Math.max(0.14, Math.min(1, Number(widgetState.volume)))
        : 0.72;
      document.body.classList.toggle('hidden', !enabled);
      document.body.classList.add('ready');
      document.documentElement.style.setProperty('--flame-energy', volume.toFixed(3));
      document.documentElement.style.setProperty('--flame-scale', (0.88 + (volume * 0.34)).toFixed(3));
      document.documentElement.style.setProperty('--flame-opacity', playing ? '0.98' : '0.72');
      [leftFlame, rightFlame].forEach((element) => {
        if (!element) return;
        element.classList.toggle('playing', playing);
        element.classList.toggle('idle', !playing);
      });
    }

    applyTheme(initialTheme);
    document.body.classList.add('ready', 'hidden');

    if (window.sideFlamesWidgetAPI && window.sideFlamesWidgetAPI.onStateUpdate) {
      window.sideFlamesWidgetAPI.onStateUpdate((payload) => {
        applyState(payload);
      });
    }
  </script>
</body>
</html>
