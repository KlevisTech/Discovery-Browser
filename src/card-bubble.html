<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Bubble</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .bubble-shell {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      -webkit-app-region: drag;
      position: relative;
      background: var(--bubble-bg, linear-gradient(140deg, #667eea 0%, #f093fb 100%));
      box-shadow:
        0 10px 24px var(--bubble-shadow, rgba(102, 126, 234, 0.45)),
        0 4px 10px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.4);
      overflow: visible;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      --buzz-scale: 1;
      --buzz-shadow: var(--bubble-shadow, rgba(102, 126, 234, 0.45));
    }

    .bubble-shell:hover {
      transform: translateY(-1px) scale(1.03);
      box-shadow:
        0 14px 30px var(--bubble-shadow-hover, rgba(102, 126, 234, 0.5)),
        0 8px 14px rgba(0, 0, 0, 0.32),
        inset 0 1px 1px rgba(255, 255, 255, 0.45);
      filter: saturate(1.06);
    }

    .bubble-shell::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.08) 38%, transparent 68%);
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }

    .bubble-shell::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .bubble-shell.media-buzzing {
      animation: bubble-buzz 920ms ease-in-out infinite;
      filter: saturate(1.16);
    }

    .bubble-shell.media-buzzing::before {
      opacity: 1;
      animation: bubble-wave 3600ms ease-out infinite;
    }

    .bubble-shell.media-buzzing::after {
      animation: bubble-ring 2600ms ease-in-out infinite;
    }

    .bubble-shell.media-buzzing .bubble-btn {
      animation: speaker-thump 760ms ease-in-out infinite;
      background: rgba(255, 255, 255, 0.17);
    }

    .bubble-shell.media-buzzing .bubble-letter {
      animation: speaker-letter 760ms ease-in-out infinite;
    }

    .bubble-shell.media-video {
      box-shadow:
        0 12px 28px var(--bubble-shadow-hover, rgba(102, 126, 234, 0.56)),
        0 8px 18px rgba(0, 0, 0, 0.36),
        inset 0 1px 1px rgba(255, 255, 255, 0.42);
    }

    .bubble-shell.media-live::before {
      background:
        radial-gradient(circle at center, rgba(255,120,120,0.24) 0%, rgba(255,255,255,0.10) 42%, transparent 74%);
    }

    .bubble-shell.media-live .bubble-btn {
      border-color: rgba(255, 205, 205, 0.5);
    }

    .bubble-reactor {
      position: absolute;
      inset: 10px;
      pointer-events: none;
      border-radius: 999px;
    }

    .bubble-reactor-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 12px;
      margin-left: -2.5px;
      margin-top: -30px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.18));
      opacity: 0;
      transform-origin: 50% 34px;
      transform: rotate(var(--bar-rot)) translateY(0) scaleY(0.45);
    }

    .bubble-shell.media-buzzing .bubble-reactor-bar {
      opacity: 0.85;
      animation: reactor-bar 1180ms ease-in-out infinite;
      animation-delay: var(--bar-delay);
    }

    .bubble-btn {
      -webkit-app-region: no-drag;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.2px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(3px);
      transition: transform 120ms ease, background 120ms ease;
      outline: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .bubble-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%) scale(1.05);
    }

    .bubble-btn:active {
      transform: translate(-50%, -50%) scale(0.97);
    }

    .bubble-letter {
      display: inline-block;
      line-height: 1;
    }

    /* Notification badge - positioned at top-right edge of bubble */
    .notification-badge {
      position: absolute;
      top: -4px;
      left: -4px;
      min-width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #ff3b30;
      color: white;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      box-shadow: 0 2px 6px rgba(255, 59, 48, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.9);
      z-index: 2;
      -webkit-app-region: no-drag;
      opacity: 0;
      transform: scale(0);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .notification-badge.visible {
      opacity: 1;
      transform: scale(1);
    }

    .notification-badge.pulse {
      animation: badge-pulse 1.5s ease-in-out infinite;
    }

    @keyframes badge-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    @keyframes bubble-buzz {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      25% {
        transform: translateY(-1px) scale(1.035);
      }
      50% {
        transform: translateY(0) scale(1.055);
      }
      75% {
        transform: translateY(1px) scale(1.025);
      }
    }

    @keyframes bubble-wave {
      0% {
        opacity: 0.55;
        transform: scale(0.9);
      }
      100% {
        opacity: 0;
        transform: scale(1.34);
      }
    }

    @keyframes bubble-ring {
      0%, 100% {
        opacity: 0.75;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }

    @keyframes speaker-thump {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      35% {
        transform: translate(-50%, -50%) scale(1.06);
      }
      70% {
        transform: translate(-50%, -50%) scale(0.98);
      }
    }

    @keyframes speaker-letter {
      0%, 100% {
        transform: scale(1);
        opacity: 0.95;
      }
      35% {
        transform: scale(1.1);
        opacity: 1;
      }
      70% {
        transform: scale(0.94);
        opacity: 0.9;
      }
    }

    @keyframes reactor-bar {
      0%, 100% {
        transform: rotate(var(--bar-rot)) translateY(0) scaleY(0.42);
        opacity: 0.45;
      }
      45% {
        transform: rotate(var(--bar-rot)) translateY(-2px) scaleY(1.12);
        opacity: 1;
      }
      70% {
        transform: rotate(var(--bar-rot)) translateY(1px) scaleY(0.66);
        opacity: 0.72;
      }
    }
  </style>
</head>
<body>
  <div class="bubble-shell" title="Drag bubble to move">
    <div class="bubble-reactor" aria-hidden="true">
      <span class="bubble-reactor-bar" style="--bar-rot: 0deg; --bar-delay: 0ms;"></span>
      <span class="bubble-reactor-bar" style="--bar-rot: 60deg; --bar-delay: 90ms;"></span>
      <span class="bubble-reactor-bar" style="--bar-rot: 120deg; --bar-delay: 180ms;"></span>
      <span class="bubble-reactor-bar" style="--bar-rot: 180deg; --bar-delay: 270ms;"></span>
      <span class="bubble-reactor-bar" style="--bar-rot: 240deg; --bar-delay: 360ms;"></span>
      <span class="bubble-reactor-bar" style="--bar-rot: 300deg; --bar-delay: 450ms;"></span>
    </div>
    <button id="restore-btn" class="bubble-btn" title="Restore Card">
      <span id="bubble-letter" class="bubble-letter" aria-hidden="true">D</span>
    </button>
    <span id="notification-badge" class="notification-badge" aria-hidden="true">0</span>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cardId = Number(params.get('cardId'));
    const title = params.get('title') || '';
    const label = params.get('label') || '';
    const theme = (params.get('theme') || 'primary').toLowerCase();
    const bubbleShell = document.querySelector('.bubble-shell');
    const restoreBtn = document.getElementById('restore-btn');
    const bubbleLetter = document.getElementById('bubble-letter');
    const notificationBadge = document.getElementById('notification-badge');
    
    // Track notification count
    let notificationCount = 0;
    let mediaPlaying = false;

    const themePalette = {
      primary: {
        bg: 'linear-gradient(140deg, #667eea 0%, #f093fb 100%)',
        shadow: 'rgba(102, 126, 234, 0.45)',
        hoverShadow: 'rgba(102, 126, 234, 0.5)',
      },
      sunset: {
        bg: 'linear-gradient(140deg, #ff4f93 0%, #ff5f6d 48%, #ffa26b 100%)',
        shadow: 'rgba(255, 79, 147, 0.45)',
        hoverShadow: 'rgba(255, 79, 147, 0.5)',
      },
      ocean: {
        bg: 'linear-gradient(140deg, #00c6ff 0%, #0072ff 100%)',
        shadow: 'rgba(0, 136, 255, 0.44)',
        hoverShadow: 'rgba(0, 136, 255, 0.52)',
      },
      emerald: {
        bg: 'linear-gradient(140deg, #11998e 0%, #38ef7d 100%)',
        shadow: 'rgba(56, 239, 125, 0.42)',
        hoverShadow: 'rgba(56, 239, 125, 0.52)',
      },
      amber: {
        bg: 'linear-gradient(140deg, #ff9966 0%, #ff5e62 100%)',
        shadow: 'rgba(255, 140, 92, 0.45)',
        hoverShadow: 'rgba(255, 140, 92, 0.54)',
      },
      midnight: {
        bg: 'linear-gradient(140deg, #0a0a0c 0%, #23232a 100%)',
        shadow: 'rgba(0, 0, 0, 0.58)',
        hoverShadow: 'rgba(0, 0, 0, 0.65)',
      },
      cocoa: {
        bg: 'linear-gradient(140deg, #6e482c 0%, #a67b5b 100%)',
        shadow: 'rgba(135, 86, 48, 0.46)',
        hoverShadow: 'rgba(135, 86, 48, 0.55)',
      },
      frost: {
        bg: 'linear-gradient(140deg, #c8d2dc 0%, #e6ebf0 100%)',
        shadow: 'rgba(200, 210, 220, 0.42)',
        hoverShadow: 'rgba(200, 210, 220, 0.52)',
      },
      alt: {
        bg: 'linear-gradient(140deg, #ff4f93 0%, #ff5f6d 48%, #ffa26b 100%)',
        shadow: 'rgba(255, 79, 147, 0.45)',
        hoverShadow: 'rgba(255, 79, 147, 0.5)',
      },
    };
    const palette = themePalette[theme] || themePalette.primary;
    if (bubbleShell && palette) {
      bubbleShell.style.setProperty('--bubble-bg', palette.bg);
      bubbleShell.style.setProperty('--bubble-shadow', palette.shadow);
      bubbleShell.style.setProperty('--bubble-shadow-hover', palette.hoverShadow);
    }
    
    // Always show the site's first letter on the button
    if (label && bubbleLetter) {
      bubbleLetter.textContent = String(label).charAt(0).toUpperCase();
    }
    if (title) {
      restoreBtn.title = `Restore: ${title}`;
    }

    // Update notification badge
    function updateNotificationBadge(count) {
      notificationCount = count;
      if (count > 0) {
        notificationBadge.textContent = count > 99 ? '99+' : count;
        notificationBadge.classList.add('visible', 'pulse');
      } else {
        notificationBadge.classList.remove('visible', 'pulse');
      }
    }

    function updateMediaReaction(payload) {
      const next = payload && typeof payload === 'object' ? payload : {};
      mediaPlaying = !!next.isPlaying;
      bubbleShell.classList.toggle('media-buzzing', mediaPlaying);
      bubbleShell.classList.toggle('media-video', mediaPlaying && !!next.isVideo);
      bubbleShell.classList.toggle('media-live', mediaPlaying && !!next.isLive);
      restoreBtn.title = mediaPlaying
        ? `${title ? `Restore: ${title}` : 'Restore Card'} • media playing`
        : (title ? `Restore: ${title}` : 'Restore Card');
    }

    // Listen for notification updates from main process
    if (window.cardBubbleAPI && window.cardBubbleAPI.onNotificationUpdate) {
      window.cardBubbleAPI.onNotificationUpdate((count) => {
        updateNotificationBadge(count);
      });
    }

    if (window.cardBubbleAPI && window.cardBubbleAPI.onMediaStateUpdate) {
      window.cardBubbleAPI.onMediaStateUpdate((payload) => {
        updateMediaReaction(payload);
      });
    }

    // Clear notifications when restored
    restoreBtn.addEventListener('click', async () => {
      try {
        // Clear notifications when opening the card
        updateNotificationBadge(0);
        
        if (window.cardBubbleAPI && window.cardBubbleAPI.restoreCard) {
          await window.cardBubbleAPI.restoreCard(cardId);
        }
      } catch (e) {
        // ignore
      }
    });

    // Add context menu for closing bubble and card
    bubbleShell.addEventListener('contextmenu', async (e) => {
      e.preventDefault();
      // Show context menu with close option
      if (window.cardBubbleAPI && window.cardBubbleAPI.showContextMenu) {
        await window.cardBubbleAPI.showContextMenu(cardId);
      }
    });
  </script>
</body>
</html>
