<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Bubble</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .bubble-shell {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      -webkit-app-region: drag;
      position: relative;
      background: var(--bubble-bg, linear-gradient(140deg, #667eea 0%, #f093fb 100%));
      box-shadow:
        0 10px 24px var(--bubble-shadow, rgba(102, 126, 234, 0.45)),
        0 4px 10px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.4);
      overflow: hidden;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .bubble-shell:hover {
      transform: translateY(-1px) scale(1.03);
      box-shadow:
        0 14px 30px var(--bubble-shadow-hover, rgba(102, 126, 234, 0.5)),
        0 8px 14px rgba(0, 0, 0, 0.32),
        inset 0 1px 1px rgba(255, 255, 255, 0.45);
      filter: saturate(1.06);
    }

    .bubble-shell::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .bubble-btn {
      -webkit-app-region: no-drag;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.2px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(3px);
      transition: transform 120ms ease, background 120ms ease;
      outline: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .bubble-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%) scale(1.05);
    }

    .bubble-btn:active {
      transform: translate(-50%, -50%) scale(0.97);
    }
  </style>
</head>
<body>
  <div class="bubble-shell" title="Drag bubble to move">
    <button id="restore-btn" class="bubble-btn" title="Restore Card">D</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cardId = Number(params.get('cardId'));
    const title = params.get('title') || '';
    const label = params.get('label') || '';
    const theme = (params.get('theme') || 'primary').toLowerCase();
    const bubbleShell = document.querySelector('.bubble-shell');
    const restoreBtn = document.getElementById('restore-btn');

    const themePalette = {
      primary: {
        bg: 'linear-gradient(140deg, #667eea 0%, #f093fb 100%)',
        shadow: 'rgba(102, 126, 234, 0.45)',
        hoverShadow: 'rgba(102, 126, 234, 0.5)',
      },
      sunset: {
        bg: 'linear-gradient(140deg, #ff4f93 0%, #ff5f6d 48%, #ffa26b 100%)',
        shadow: 'rgba(255, 79, 147, 0.45)',
        hoverShadow: 'rgba(255, 79, 147, 0.5)',
      },
      ocean: {
        bg: 'linear-gradient(140deg, #00c6ff 0%, #0072ff 100%)',
        shadow: 'rgba(0, 136, 255, 0.44)',
        hoverShadow: 'rgba(0, 136, 255, 0.52)',
      },
      emerald: {
        bg: 'linear-gradient(140deg, #11998e 0%, #38ef7d 100%)',
        shadow: 'rgba(56, 239, 125, 0.42)',
        hoverShadow: 'rgba(56, 239, 125, 0.52)',
      },
      amber: {
        bg: 'linear-gradient(140deg, #ff9966 0%, #ff5e62 100%)',
        shadow: 'rgba(255, 140, 92, 0.45)',
        hoverShadow: 'rgba(255, 140, 92, 0.54)',
      },
      midnight: {
        bg: 'linear-gradient(140deg, #0a0a0c 0%, #23232a 100%)',
        shadow: 'rgba(0, 0, 0, 0.58)',
        hoverShadow: 'rgba(0, 0, 0, 0.65)',
      },
      cocoa: {
        bg: 'linear-gradient(140deg, #6e482c 0%, #a67b5b 100%)',
        shadow: 'rgba(135, 86, 48, 0.46)',
        hoverShadow: 'rgba(135, 86, 48, 0.55)',
      },
      alt: {
        bg: 'linear-gradient(140deg, #ff4f93 0%, #ff5f6d 48%, #ffa26b 100%)',
        shadow: 'rgba(255, 79, 147, 0.45)',
        hoverShadow: 'rgba(255, 79, 147, 0.5)',
      },
    };
    const palette = themePalette[theme] || themePalette.primary;
    if (bubbleShell && palette) {
      bubbleShell.style.setProperty('--bubble-bg', palette.bg);
      bubbleShell.style.setProperty('--bubble-shadow', palette.shadow);
      bubbleShell.style.setProperty('--bubble-shadow-hover', palette.hoverShadow);
    }
    if (label) {
      restoreBtn.textContent = String(label).charAt(0).toUpperCase();
    }
    if (title) {
      restoreBtn.title = `Restore: ${title}`;
    }

    restoreBtn.addEventListener('click', async () => {
      try {
        if (window.cardBubbleAPI && window.cardBubbleAPI.restoreCard) {
          await window.cardBubbleAPI.restoreCard(cardId);
        }
      } catch (e) {
        // ignore
      }
    });
  </script>
</body>
</html>
